<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Map2 Mask 编辑器</title>
<style>
  body{margin:0;padding:0;background:#222;color:#ccc;font:13px monospace;}
  #wrap{padding:8px;}
  #toolbar{position:sticky;top:0;background:#333;padding:8px 10px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;border-bottom:1px solid #555;z-index:10;}
  #toolbar button{background:#444;color:#eee;border:1px solid #666;padding:6px 14px;cursor:pointer;font-family:monospace;}
  #toolbar button:hover{background:#555;}
  #toolbar button.active{background:#0a6;border-color:#0c8;}
  #toolbar label{display:inline-flex;align-items:center;gap:4px;}
  #info{margin-left:auto;color:#8c8;}
  #cv-wrap{padding:10px;}
  canvas{display:block;cursor:crosshair;border:1px solid #555;}
  #out{position:fixed;bottom:0;left:0;right:0;background:#111;padding:8px;border-top:2px solid #0a6;display:none;}
  #out textarea{width:100%;height:80px;background:#000;color:#0f0;border:none;font:11px monospace;padding:4px;resize:vertical;}
  .hint{font-size:11px;color:#888;margin-left:6px;}
  #emergencyExport{position:fixed;top:60px;right:14px;background:#a04020;color:#fff;border:1px solid #f60;padding:6px 12px;cursor:pointer;font-family:monospace;z-index:100;border-radius:4px;font-size:12px;}
  #emergencyExport:hover{background:#c05030;}
  #saveStatus{position:fixed;top:60px;right:175px;color:#6f6;font-size:11px;z-index:100;}
</style>
</head>
<body>
<button id="emergencyExport" title="任何时候点这里都能导出（Ctrl+S 同效）">⬇ 紧急保存</button>
<span id="saveStatus">●</span>
<div id="toolbar">
  <button id="btnPaint" class="active">画可走（左键）</button>
  <button id="btnErase">画禁走（右键）</button>
  <label>笔刷:
    <select id="brushSize">
      <option value="1">1×1</option>
      <option value="2" selected>2×2</option>
      <option value="3">3×3</option>
      <option value="5">5×5</option>
      <option value="8">8×8</option>
    </select>
  </label>
  <label><input type="checkbox" id="showGrid" checked> 网格</label>
  <label><input type="checkbox" id="showOverlay" checked> 颜色叠加</label>
  <button id="btnReset">重置(用 ground2_mask.js)</button>
  <button id="btnExport">导出 ground2_mask.js</button>
  <button id="btnDownloadPng">下载预览</button>
  <span id="info">--</span>
  <span class="hint">左键=可走（绿）  右键=禁走（红）  滚轮=缩放</span>
</div>
<div id="cv-wrap"><canvas id="cv"></canvas></div>
<div id="out">
  <div style="margin-bottom:4px;color:#0f8;">点击全选复制下面内容，覆盖到 game/ground2_mask.js</div>
  <textarea id="outTxt"></textarea>
</div>
<script src="ground2_mask.js"></script>
<script>
const MAP_W = (typeof LEVEL2_MASK_W !== 'undefined') ? LEVEL2_MASK_W : 72;
const MAP_H = (typeof LEVEL2_MASK_H !== 'undefined') ? LEVEL2_MASK_H : 48;
let mask = new Uint8Array(MAP_W * MAP_H);

function loadInit() {
  // 优先从 localStorage 恢复（防止刷新/卡死丢失进度）
  try {
    const saved = localStorage.getItem('mask2_autosave');
    if(saved && saved.length === MAP_W * MAP_H){
      for(let i=0; i<mask.length; i++) mask[i] = saved.charCodeAt(i) === 49 ? 1 : 0;
      console.log('[restored from localStorage]');
      return;
    }
  } catch(e){}
  if(typeof LEVEL2_MASK !== 'undefined') {
    for(let i=0; i<MAP_W*MAP_H; i++)
      mask[i] = LEVEL2_MASK.charCodeAt(i) === 49 ? 1 : 0;
  }
}
loadInit();

// 节流自动保存（每 0.5s 最多保存一次）
let _saveTimer = null;
function autosave(){
  if(_saveTimer) return;
  _saveTimer = setTimeout(() => {
    let s = '';
    for(let i=0;i<mask.length;i++) s += mask[i] ? '1' : '0';
    try { localStorage.setItem('mask2_autosave', s); } catch(e){}
    _saveTimer = null;
  }, 500);
}

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let bgImg = new Image();
let scale = 1.5;
let imgReady = false;

bgImg.onload = () => {
  imgReady = true;
  scale = Math.min((window.innerWidth - 40) / bgImg.width, (window.innerHeight - 100) / bgImg.height);
  if(scale > 1) scale = 1;
  if(scale < 0.5) scale = 0.5;
  resize();
  draw();
};
bgImg.onerror = () => {
  console.warn('ground2_clean.png 加载失败');
  resize();
  draw();
};
bgImg.src = 'ground2_clean.png';

function resize() {
  const w = imgReady ? bgImg.width : MAP_W * 16;
  const h = imgReady ? bgImg.height : MAP_H * 16;
  cv.width  = w * scale;
  cv.height = h * scale;
}

function draw() {
  // 暗底凸显石板边缘
  ctx.fillStyle='#0a0a14';
  ctx.fillRect(0,0,cv.width,cv.height);
  if(imgReady) ctx.drawImage(bgImg, 0, 0, cv.width, cv.height);

  const tsx = cv.width / MAP_W;
  const tsy = cv.height / MAP_H;

  if(document.getElementById('showOverlay').checked) {
    for(let y=0; y<MAP_H; y++) for(let x=0; x<MAP_W; x++) {
      ctx.fillStyle = mask[y*MAP_W+x] ? 'rgba(0,255,0,0.30)' : 'rgba(255,0,0,0.30)';
      ctx.fillRect(x*tsx, y*tsy, tsx, tsy);
    }
  }

  if(document.getElementById('showGrid').checked) {
    ctx.strokeStyle = 'rgba(255,255,255,0.20)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    for(let x=0; x<=MAP_W; x++) { ctx.moveTo(x*tsx, 0); ctx.lineTo(x*tsx, cv.height); }
    for(let y=0; y<=MAP_H; y++) { ctx.moveTo(0, y*tsy); ctx.lineTo(cv.width, y*tsy); }
    ctx.stroke();
  }
  updateInfo();
}

function updateInfo() {
  let walkN = 0;
  for(let i=0;i<mask.length;i++) if(mask[i]) walkN++;
  document.getElementById('info').textContent =
    `${MAP_W}×${MAP_H}  walkable=${walkN}/${mask.length} (${Math.round(walkN*100/mask.length)}%)`;
}

let painting = false;
let paintMode = 1;

function paintAt(clientX, clientY) {
  const rect = cv.getBoundingClientRect();
  const x = clientX - rect.left;
  const y = clientY - rect.top;
  const tx = Math.floor(x / (cv.width/MAP_W));
  const ty = Math.floor(y / (cv.height/MAP_H));
  const brush = parseInt(document.getElementById('brushSize').value);
  const r = Math.floor(brush/2);
  for(let dy=-r; dy<=brush-1-r; dy++)
    for(let dx=-r; dx<=brush-1-r; dx++) {
      const nx = tx+dx, ny = ty+dy;
      if(nx>=0 && ny>=0 && nx<MAP_W && ny<MAP_H)
        mask[ny*MAP_W + nx] = paintMode;
    }
  draw();
  autosave();
}

cv.addEventListener('contextmenu', e => e.preventDefault());
cv.addEventListener('mousedown', e => {
  e.preventDefault();
  painting = true;
  paintMode = (e.button === 2) ? 0 : 1;
  paintAt(e.clientX, e.clientY);
});
window.addEventListener('mousemove', e => {
  if(painting) paintAt(e.clientX, e.clientY);
});
// 保险：任何 mouseup / mouseleave / blur 都强制结束绘制态（防卡死）
window.addEventListener('mouseup', () => painting = false);
window.addEventListener('blur',    () => painting = false);
document.addEventListener('mouseleave', () => painting = false);
document.addEventListener('visibilitychange', () => { if(document.hidden) painting = false; });

cv.addEventListener('wheel', e => {
  e.preventDefault();
  scale *= e.deltaY < 0 ? 1.1 : 0.9;
  scale = Math.max(0.3, Math.min(3, scale));
  resize();
  draw();
}, {passive:false});

document.getElementById('btnPaint').onclick = () => {
  paintMode = 1;
  document.getElementById('btnPaint').classList.add('active');
  document.getElementById('btnErase').classList.remove('active');
};
document.getElementById('btnErase').onclick = () => {
  paintMode = 0;
  document.getElementById('btnErase').classList.add('active');
  document.getElementById('btnPaint').classList.remove('active');
};
document.getElementById('showGrid').onchange = draw;
document.getElementById('showOverlay').onchange = draw;
document.getElementById('btnReset').onclick = () => {
  if(!confirm('重置为 ground2_mask.js 当前内容？')) return;
  loadInit(); draw();
};

document.getElementById('btnExport').onclick = () => {
  let s = '';
  for(let i=0; i<mask.length; i++) s += mask[i] ? '1' : '0';
  const code =
    `// hand-edited via mask_editor2.html\n` +
    `const LEVEL2_MASK_W = ${MAP_W};\n` +
    `const LEVEL2_MASK_H = ${MAP_H};\n` +
    `const LEVEL2_MASK = "${s}";\n`;
  const out = document.getElementById('out');
  const ta  = document.getElementById('outTxt');
  out.style.display = 'block';
  ta.value = code;
  ta.focus(); ta.select();

  const blob = new Blob([code], {type:'text/javascript'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ground2_mask.js';
  a.textContent = '下载 ground2_mask.js';
  a.style.cssText = 'display:inline-block;margin-top:6px;color:#0f8;';
  out.appendChild(a);
  setTimeout(() => a.click(), 100);
};

document.getElementById('btnDownloadPng').onclick = () => {
  const a = document.createElement('a');
  a.href = cv.toDataURL('image/png');
  a.download = 'map2_mask_preview.png';
  a.click();
};

// 紧急导出（固定位置始终可见 + Ctrl+S 快捷键）
document.getElementById('emergencyExport').onclick = () => {
  document.getElementById('btnExport').click();
};
window.addEventListener('keydown', e => {
  // Ctrl+S 导出
  if(e.ctrlKey && e.code === 'KeyS'){
    e.preventDefault();
    document.getElementById('btnExport').click();
  }
  // 数字 1 = 画可走（绿）/ 数字 2 = 画禁走（红）
  if(e.code === 'Digit1' || e.code === 'Numpad1') document.getElementById('btnPaint').click();
  if(e.code === 'Digit2' || e.code === 'Numpad2') document.getElementById('btnErase').click();
  // ESC 强制取消绘制（卡死时救援）
  if(e.code === 'Escape') painting = false;
});

// 保存状态指示器
setInterval(() => {
  const status = document.getElementById('saveStatus');
  const has = !!localStorage.getItem('mask2_autosave');
  status.textContent = has ? '● 已自动保存' : '● 未保存';
  status.style.color = has ? '#6f6' : '#f66';
}, 500);

draw();
</script>
</body>
</html>
