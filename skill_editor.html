<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>技能编辑器 — 游戏配置</title>
<style>
  :root { --bg:#0d0d12; --card:#161620; --border:#2a2a35; --accent:#c05040; --txt:#ddd; --txt2:#888; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--txt);font:13px/1.5 'Courier New',monospace;display:flex;min-height:100vh;}
  #sidebar{width:220px;background:var(--card);border-right:1px solid var(--border);padding:12px;overflow-y:auto;flex-shrink:0;}
  #sidebar h2{font-size:14px;color:var(--accent);margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px;}
  #sidebar ul{list-style:none;}
  #sidebar li{padding:5px 8px;cursor:pointer;border-radius:3px;color:var(--txt2);}
  #sidebar li:hover{background:rgba(192,80,64,.15);color:var(--txt);}
  #sidebar li.active{background:var(--accent);color:#fff;}
  #main{flex:1;padding:16px 24px;overflow-y:auto;max-height:100vh;}
  h1{font-size:18px;margin-bottom:16px;color:var(--accent);}
  .skill-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:14px 18px;margin-bottom:12px;}
  .skill-card h3{font-size:14px;margin-bottom:8px;color:#fff;display:flex;justify-content:space-between;}
  .skill-card h3 .tag{font-size:11px;color:var(--accent);border:1px solid var(--accent);padding:1px 6px;border-radius:3px;}
  .param-row{display:flex;gap:12px;margin-bottom:4px;align-items:center;}
  .param-row label{width:110px;flex-shrink:0;color:var(--txt2);text-align:right;padding-right:8px;}
  .param-row input,.param-row select{flex:1;background:#0e0e14;color:#eee;border:1px solid var(--border);padding:4px 8px;border-radius:3px;font:inherit;}
  .param-row input:focus{border-color:var(--accent);outline:none;}
  .param-row input[type=range]{background:transparent;border:none;}
  .param-row .val{text-align:right;width:60px;color:var(--txt);}
  .desc{font-size:12px;color:var(--txt2);margin-top:4px;border-left:2px solid var(--border);padding-left:8px;}
  #export{position:fixed;bottom:16px;right:24px;display:flex;gap:10px;}
  #export button{background:var(--accent);color:#fff;border:none;padding:8px 18px;border-radius:4px;cursor:pointer;font:inherit;}
  #export button:hover{opacity:.85;}
  .collapsed .param-row,.collapsed .desc{display:none;}
  .collapsed h3::after{content:' ▸';}
  .skill-card:not(.collapsed) h3::after{content:' ';}
  .skill-card h3{cursor:pointer;}
  .search-box{width:100%;padding:6px 8px;background:#0e0e14;border:1px solid var(--border);color:#eee;border-radius:3px;font:inherit;margin-bottom:10px;}
</style>
</head>
<body>

<div id="sidebar">
  <h2>⚔ 技能编辑</h2>
  <input class="search-box" type="text" placeholder="搜索技能..." oninput="filterList(this.value)">
  <ul id="groupList">
    <li class="active" data-group="lucia">Lucia Boss</li>
    <li data-group="knight">黄金骑士</li>
    <li data-group="role3">飞剑使 (玩家)</li>
    <li data-group="player">玩家通用</li>
  </ul>
</div>

<div id="main">
  <h1 id="groupTitle">Lucia Boss 技能配置</h1>
  <div id="cards"></div>
</div>

<div id="export">
  <button onclick="window.copyJSON()">📋 复制 JSON</button>
  <button onclick="window.downloadJS()">💾 下载 .js</button>
  <button onclick="window.loadFromGame()">🔄 加载当前</button>
</div>

let currentGroup = 'lucia';

function getParams(group, idx){
  return SKILLS[group][idx].params;
}

function render(){
  const cards = document.getElementById('cards');
  const title = document.getElementById('groupTitle');
  const labels = {lucia:'Lucia Boss 技能', knight:'黄金骑士', role3:'飞剑使 (玩家)', player:'玩家通用'};
  title.textContent = labels[currentGroup];
  const items = SKILLS[currentGroup];
  cards.innerHTML = items.map((s,i) => {
    const rows = s.paramDefs.map(p => {
      const v = s.params[p.k] ?? '';
      let input;
      if(p.type === 'bool'){
        input = `<select data-g="${currentGroup}" data-i="${i}" data-k="${p.k}" onchange="updateVal(this)">
          <option value="true" ${v?'selected':''}>是</option>
          <option value="false" ${!v?'selected':''}>否</option>
        </select>`;
      } else {
        input = `<input type="range" min="${p.min}" max="${p.max}" step="${p.step}"
          value="${v}" data-g="${currentGroup}" data-i="${i}" data-k="${p.k}"
          oninput="updateRange(this)" />
          <span class="val" id="v${currentGroup}${i}${p.k}">${v}</span>`;
      }
      return `<div class="param-row">
        <label>${p.label}</label>${input}
      </div>`;
    }).join('');
    return `<div class="skill-card collapsed" onclick="toggleCard(this)">
      <h3><span>${s.name}</span><span class="tag">${s.id}</span></h3>
      ${rows}
      <div class="desc">${s.desc}</div>
    </div>`;
  }).join('');
}

function toggleCard(el){ el.classList.toggle('collapsed'); }
function updateRange(el){
  const v = parseFloat(el.value);
  document.getElementById(`v${el.dataset.g}${el.dataset.i}${el.dataset.k}`).textContent = v;
  SKILLS[el.dataset.g][el.dataset.i].params[el.dataset.k] = v;
}
function updateVal(el){
  SKILLS[el.dataset.g][el.dataset.i].params[el.dataset.k] = el.value === 'true';
}

function filterList(q){
  const items = document.querySelectorAll('#cards .skill-card');
  q = q.toLowerCase();
  items.forEach(el => {
    const name = el.querySelector('h3 span').textContent.toLowerCase();
    const tag = el.querySelector('.tag').textContent.toLowerCase();
    el.style.display = (name.includes(q) || tag.includes(q) || !q) ? '' : 'none';
  });
}

document.querySelectorAll('#groupList li').forEach(li => {
  li.onclick = () => {
    document.querySelectorAll('#groupList li').forEach(l => l.classList.remove('active'));
    li.classList.add('active');
    currentGroup = li.dataset.group;
    render();
  };
});

window.copyJSON = function(){
  const json = JSON.stringify(SKILLS[currentGroup].map(s => ({id:s.id,name:s.name,...s.params})), null, 2);
  navigator.clipboard.writeText(json).then(()=>alert('已复制！'));
};
window.downloadJS = function(){
  const json = JSON.stringify(SKILLS[currentGroup].map(s => ({id:s.id,name:s.name,...s.params})), null, 2);
  const blob = new Blob([json], {type:'text/javascript'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = currentGroup + '_skills.json';
  a.click();
};
window.loadFromGame = function(){
  // 从 localStorage 加载（如果之前保存过）
  const saved = localStorage.getItem('game_skills');
  if(saved){
    const data = JSON.parse(saved);
    Object.assign(SKILLS, data);
    render();
    alert('已加载保存的配置');
  } else {
    alert('暂无存档，请手动配置后保存');
  }
};
// 自动保存
window.addEventListener('beforeunload', ()=>{
  localStorage.setItem('game_skills', JSON.stringify(SKILLS));
});

render();

</html>
