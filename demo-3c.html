<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Moksha Echo · 解脱回声</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}
html, body{
  width:100%; height:100%; overflow:hidden;
  position: fixed; left:0; top:0;
  -webkit-text-size-adjust: 100%;
  -webkit-overflow-scrolling: auto;
  overscroll-behavior: none;
  touch-action: none;
}
body{background:#060A14;display:flex;align-items:center;justify-content:center;font-family:'PingFang SC','Microsoft YaHei',monospace;-webkit-tap-highlight-color:transparent;}
/* 画布外有一层柔光投影；画布本身 mask 边缘渐隐 */
#c-wrap{position:relative;}
#c-wrap::before{
  content:'';position:absolute;inset:-30px;
  background:radial-gradient(ellipse at center, rgba(255,80,40,0.08) 0%, rgba(0,0,0,0) 70%);
  pointer-events:none;
}
canvas{
  display:block;
  image-rendering:pixelated;
  -webkit-mask-image: radial-gradient(ellipse 80% 80% at center, #000 70%, rgba(0,0,0,0.7) 88%, transparent 100%);
          mask-image: radial-gradient(ellipse 80% 80% at center, #000 70%, rgba(0,0,0,0.7) 88%, transparent 100%);
  box-shadow: 0 0 60px 8px rgba(180,40,10,0.30),
              0 0 140px 30px rgba(120,20,5,0.18);
  border-radius: 6px;
}
#dbg{display:none}

/* ─────────────────────────────────────────────
   移动端 UI 层（默认隐藏，手机/触屏端激活）
   ───────────────────────────────────────────── */
#mobile-ui { display: none; }
body.mobile #mobile-ui { display: block; }

/* 整体视口包装 */
body.mobile{ background:#000; overflow:hidden; }
body.mobile #c-wrap{
  position:fixed;
  margin: 0;
  pointer-events: none;
  z-index: 1;
}
body.mobile #c-wrap canvas{
  -webkit-mask-image: none !important;
          mask-image: none !important;
  box-shadow: none !important;
  border-radius: 0;
  pointer-events: auto;
  image-rendering: pixelated;
  image-rendering: -webkit-optimize-contrast;
  display: block;
}
body.mobile #c-wrap::before{ display:none; }

/* ─── 强制横屏：设备竖屏时整体旋转 90° ─── */
body.mobile.force-landscape{ /* 触发标记 */ }
body.mobile.force-landscape #c-wrap,
body.mobile.force-landscape #joystick-area,
body.mobile.force-landscape #skill-pad,
body.mobile.force-landscape #sb-J,
body.mobile.force-landscape #btn-ai,
body.mobile.force-landscape #btn-boss-ai{
  /* 各自由 JS 设置 transform，统一加 rotate(90deg) */
}

/* 竖屏强制提示横屏（点击关闭）*/
#rotate-hint{
  display: none;
  position: fixed; inset: 0;
  background: #000;
  z-index: 9999;
  align-items: center; justify-content: center;
  flex-direction: column;
  color: #FFE7B0;
  font: 600 16px/1.6 'PingFang SC',sans-serif;
  text-align: center;
  padding: 20px;
  cursor: pointer;
}
#rotate-hint .ico{
  width: 110px; height: 64px;
  border: 3px solid #FFB050;
  border-radius: 12px;
  margin-bottom: 24px;
  position: relative;
  animation: rot-anim 1.6s ease-in-out infinite;
}
#rotate-hint .ico::after{
  content:''; position:absolute; left:8px; top:50%;
  width: 8px; height: 8px; border-radius:50%;
  background: #FFB050; transform: translateY(-50%);
}
#rotate-hint .tip{
  margin-top: 18px;
  font-size: 13px;
  opacity: 0.6;
  border: 1px solid rgba(255,180,80,0.4);
  padding: 8px 18px;
  border-radius: 6px;
}
@keyframes rot-anim{
  0%, 100%{ transform: rotate(0deg); }
  40%, 60%{ transform: rotate(-90deg); }
}
/* 提示仅短暂显示几秒（已强制旋转画面，提示主要是告知）*/
body.mobile #rotate-hint{ display: none; }
body.mobile.show-hint:not(.hint-dismissed) #rotate-hint{ display: flex; }

/* ─── 顶角小按钮（AI / Boss AI）─── */
#btn-ai, #btn-boss-ai{
  position:fixed; top:calc(env(safe-area-inset-top, 0) + 12px);
  width:60px; height:32px;
  display:flex; align-items:center; justify-content:center;
  font:600 11px/1 'PingFang SC',sans-serif;
  letter-spacing:2px;
  color: rgba(255,220,170,0.85);
  background: linear-gradient(180deg, rgba(20,12,8,0.45) 0%, rgba(0,0,0,0.55) 100%);
  border: 1px solid rgba(255,180,80,0.45);
  border-radius: 4px;
  z-index: 60;
  -webkit-tap-highlight-color: transparent;
  cursor: pointer;
  transition: transform 0.08s, box-shadow 0.2s, background 0.2s, border-color 0.2s;
  user-select: none;
  /* 双层高光浮雕 */
  box-shadow:
    inset 0 1px 0 rgba(255,200,140,0.18),
    inset 0 -1px 0 rgba(0,0,0,0.6),
    0 1px 4px rgba(0,0,0,0.6);
}
#btn-ai{ left: calc(env(safe-area-inset-left, 0) + 12px); }
#btn-boss-ai{ right: calc(env(safe-area-inset-right, 0) + 12px); }
#btn-ai .dot, #btn-boss-ai .dot{
  width:5px; height:5px; border-radius:50%;
  background:#444; margin-right:6px;
  box-shadow: inset 0 0 2px rgba(0,0,0,0.8);
}
#btn-ai.on{
  color: #FFF6D8;
  background: linear-gradient(180deg, rgba(140,60,30,0.7) 0%, rgba(80,30,15,0.7) 100%);
  border-color: #FFC470;
  box-shadow:
    inset 0 1px 0 rgba(255,220,160,0.5),
    inset 0 -1px 0 rgba(40,10,5,0.7),
    0 0 14px rgba(255,160,60,0.55),
    0 1px 4px rgba(0,0,0,0.6);
}
#btn-ai.on .dot{ background:#FFE066; box-shadow:0 0 5px #FF9020, inset 0 0 2px rgba(255,255,255,0.8); }
#btn-boss-ai.on{
  color: #FFE0E0;
  background: linear-gradient(180deg, rgba(160,40,40,0.7) 0%, rgba(80,15,15,0.7) 100%);
  border-color: #FF8080;
  box-shadow:
    inset 0 1px 0 rgba(255,180,180,0.5),
    inset 0 -1px 0 rgba(40,5,5,0.7),
    0 0 14px rgba(255,80,80,0.55),
    0 1px 4px rgba(0,0,0,0.6);
}
#btn-boss-ai.on .dot{ background:#FF6060; box-shadow:0 0 5px #FF2020, inset 0 0 2px rgba(255,255,255,0.8); }
#btn-ai:active, #btn-boss-ai:active{ transform: scale(0.92); }

/* ─── 左下：虚拟摇杆（高级透明 + 金线浮雕）─── */
#joystick-area{
  position: fixed;
  left: 0; bottom: 0;
  width: 38vw; height: 38vw;
  max-width: 220px; max-height: 220px;
  z-index: 55;
  touch-action: none;
}
#joystick-base{
  position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
  width:108px; height:108px; border-radius:50%;
  background: radial-gradient(circle at center, rgba(0,0,0,0.20) 0%, rgba(0,0,0,0.05) 70%, transparent 100%);
  border: 1.5px solid rgba(255,200,140,0.30);
  box-shadow:
    inset 0 0 18px rgba(0,0,0,0.40),
    inset 0 0 1px rgba(255,200,140,0.4),
    0 0 14px rgba(0,0,0,0.5);
  opacity: 0.85;
  transition: opacity 0.2s, border-color 0.2s, box-shadow 0.2s;
}
/* 摇杆基底装饰：内圈刻度 */
#joystick-base::before{
  content:''; position:absolute; inset:14px;
  border-radius:50%;
  border: 1px dashed rgba(255,200,140,0.18);
  pointer-events:none;
}
#joystick-area.active #joystick-base{
  opacity: 1;
  border-color: rgba(255,220,160,0.65);
  box-shadow:
    inset 0 0 22px rgba(0,0,0,0.45),
    inset 0 0 1px rgba(255,220,160,0.6),
    0 0 18px rgba(255,160,60,0.25);
}
#joystick-stick{
  position:absolute; left:50%; top:50%;
  width:46px; height:46px; border-radius:50%;
  background:
    radial-gradient(circle at 35% 30%, rgba(255,230,180,0.85) 0%, rgba(220,140,80,0.75) 35%, rgba(120,50,30,0.85) 80%, rgba(60,20,10,0.95) 100%);
  border: 1.5px solid rgba(255,230,170,0.85);
  box-shadow:
    inset 0 1px 4px rgba(255,255,255,0.35),
    inset 0 -2px 5px rgba(0,0,0,0.5),
    0 0 12px rgba(255,150,80,0.5),
    0 2px 4px rgba(0,0,0,0.6);
  transform: translate(-50%, -50%);
  pointer-events: none;
}

/* ─── 右下：技能盘（透明扁平，沿屏幕右下边缘弧形分布）─── */
#skill-pad{
  position: fixed;
  right: 0;
  bottom: 0;
  width: 320px; height: 280px;
  z-index: 55;
  touch-action: none;
  pointer-events: none;
}

.skill-btn{
  position: absolute;
  width: 42px; height: 42px;
  border-radius: 50%;
  display:flex; align-items:center; justify-content:center;
  font: 700 12px/1 'PingFang SC',sans-serif;
  letter-spacing: 0.3px;
  color: rgba(255,250,220,0.95);
  /* 黑底 + 微金渐变 */
  background:
    radial-gradient(circle at 50% 35%, rgba(40,22,14,0.45) 0%, rgba(0,0,0,0.55) 100%);
  border: 1.5px solid rgba(255,180,80,0.55);
  pointer-events: auto;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  cursor: pointer;
  text-shadow: 0 1px 2px rgba(0,0,0,0.95), 0 0 4px rgba(255,140,60,0.4);
  transition: transform 0.08s, box-shadow 0.2s, background 0.15s, border-color 0.15s;
  overflow: hidden;
  /* 三层光影：内高光 / 内阴影 / 外金光 */
  box-shadow:
    inset 0 1px 1px rgba(255,220,160,0.30),
    inset 0 -1px 2px rgba(0,0,0,0.7),
    inset 0 0 0 1px rgba(0,0,0,0.4),
    0 0 6px rgba(255,140,60,0.18),
    0 1px 3px rgba(0,0,0,0.6);
}
/* 装饰：内圈金线 */
.skill-btn::before{
  content:''; position:absolute; inset:3px;
  border-radius:50%;
  border: 1px solid rgba(255,200,140,0.18);
  pointer-events:none;
  z-index: 1;
}
.skill-btn::after{
  /* CD 遮罩（圆锥渐变）*/
  content:''; position:absolute; inset:0; border-radius:50%;
  pointer-events:none;
  background: conic-gradient(from -90deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.65) var(--cd, 0%), transparent var(--cd, 0%));
  opacity: 0.95;
  z-index: 2;
}
.skill-btn .lbl{
  position:relative; z-index:3;
  font-size: 11px;
  font-weight: 800;
}
.skill-btn .key{
  position:absolute; bottom:1px; right:3px;
  font:700 7px/1 monospace; color:rgba(255,200,120,0.6); z-index:3;
  letter-spacing: 0.5px;
}
.skill-btn:active, .skill-btn.pressed{
  transform: scale(0.86);
  background:
    radial-gradient(circle at 50% 35%, rgba(255,180,80,0.45) 0%, rgba(180,80,30,0.55) 100%);
  border-color: rgba(255,240,180,1);
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,0.55),
    inset 0 -1px 2px rgba(0,0,0,0.4),
    0 0 16px rgba(255,200,100,0.85),
    0 0 4px rgba(255,255,255,0.6);
}
.skill-btn.dim{ opacity: 0.5; filter: saturate(0.5) brightness(0.85); }

/* ── 移动端：隐藏进阶技能按钮（由连携系统自动触发）── */
body.mobile #sb-V, body.mobile #sb-B, body.mobile #sb-P,
body.mobile #sb-M, body.mobile #sb-L, body.mobile #sb-O,
body.mobile #sb-N, body.mobile #sb-U { display: none !important; }

/* ── 移动端：重新布局三按钮（J/K/I）── */
/* K 冲刺：J 左上方 */
body.mobile #sb-K{
  right: calc(env(safe-area-inset-right, 0) + 82px);
  bottom: calc(env(safe-area-inset-bottom, 0) + 60px);
}
/* I 防御：J 正上方 */
body.mobile #sb-I{
  right: calc(env(safe-area-inset-right, 0) + 16px);
  bottom: calc(env(safe-area-inset-bottom, 0) + 94px);
}

/* ── 主攻 J 位置：右下角（贴底，整组技能跟着下移）──
   J right=10, bottom=8，则 J 中心 = (49, 47)
*/
#sb-J{
  position: fixed;
  right: calc(env(safe-area-inset-right, 0) + 10px);
  bottom: calc(env(safe-area-inset-bottom, 0) + 8px);
  width: 78px; height: 78px;
}

/* ── 第 2 排内圈 5 技能（半径 95，间距 25°，gap≈0px 紧凑不重叠）──
   J 中心(49, 47)
*/
/* θ=95°:  cos=-0.087, sin=0.996 → cR=49+8.3=57, cB=47+94.6=142 → right=36, bottom=121 */
#sb-K{ right: calc(env(safe-area-inset-right, 0) + 36px);  bottom: calc(env(safe-area-inset-bottom, 0) + 121px); }
/* θ=120°: cos=-0.5,    sin=0.866 → cR=49+47.5=97, cB=47+82.3=129 → right=76, bottom=108 */
#sb-I{ right: calc(env(safe-area-inset-right, 0) + 76px);  bottom: calc(env(safe-area-inset-bottom, 0) + 108px); }
/* θ=145°: cos=-0.819, sin=0.574 → cR=49+77.8=127, cB=47+54.5=102 → right=106, bottom=81 */
#sb-O{ right: calc(env(safe-area-inset-right, 0) + 106px); bottom: calc(env(safe-area-inset-bottom, 0) + 81px); }
/* θ=170°: cos=-0.985, sin=0.174 → cR=49+93.6=143, cB=47+16.5=63 → right=122, bottom=42 */
#sb-N{ right: calc(env(safe-area-inset-right, 0) + 122px); bottom: calc(env(safe-area-inset-bottom, 0) + 42px); }
/* θ=195°: cos=-0.966, sin=-0.259 → cR=49+91.7=141, cB=47-24.6=22 → right=120, bottom=1 */
#sb-M{ right: calc(env(safe-area-inset-right, 0) + 120px); bottom: calc(env(safe-area-inset-bottom, 0) + 1px); }

/* ── 第 3 排外圈 5 技能（半径 150，间距 22°）── */
/* θ=98°:  cos=-0.139, sin=0.990 → cR=49+20.9=70, cB=47+148.5=196 → right=49, bottom=175 */
#sb-P{ right: calc(env(safe-area-inset-right, 0) + 49px);  bottom: calc(env(safe-area-inset-bottom, 0) + 175px); }
/* θ=120°: cos=-0.5,   sin=0.866 → cR=49+75=124, cB=47+129.9=177 → right=103, bottom=156 */
#sb-L{ right: calc(env(safe-area-inset-right, 0) + 103px); bottom: calc(env(safe-area-inset-bottom, 0) + 156px); }
/* θ=142°: cos=-0.788, sin=0.616 → cR=49+118.2=167, cB=47+92.4=139 → right=146, bottom=118 */
#sb-U{ right: calc(env(safe-area-inset-right, 0) + 146px); bottom: calc(env(safe-area-inset-bottom, 0) + 118px); }
/* θ=164°: cos=-0.961, sin=0.276 → cR=49+144.2=193, cB=47+41.4=88 → right=172, bottom=67 */
#sb-V{ right: calc(env(safe-area-inset-right, 0) + 172px); bottom: calc(env(safe-area-inset-bottom, 0) + 67px); }
/* θ=186°: cos=-0.995, sin=-0.105 → cR=49+149.2=198, cB=47-15.7=31 → right=177, bottom=10 */
#sb-B{ right: calc(env(safe-area-inset-right, 0) + 177px); bottom: calc(env(safe-area-inset-bottom, 0) + 10px); }

#sb-J{
  width: 78px; height: 78px;
  font-size: 16px;
  background:
    radial-gradient(circle at 50% 30%, rgba(220,90,40,0.55) 0%, rgba(120,40,20,0.65) 60%, rgba(40,15,8,0.75) 100%);
  border: 2px solid rgba(255,200,100,0.85);
  box-shadow:
    inset 0 2px 2px rgba(255,220,160,0.45),
    inset 0 -2px 3px rgba(0,0,0,0.7),
    inset 0 0 0 1px rgba(80,30,10,0.6),
    0 0 18px rgba(255,140,50,0.55),
    0 2px 6px rgba(0,0,0,0.7);
  z-index: 56;
  animation: j-breath 2.4s ease-in-out infinite;
}
@keyframes j-breath{
  0%, 100%{ box-shadow:
    inset 0 2px 2px rgba(255,220,160,0.45),
    inset 0 -2px 3px rgba(0,0,0,0.7),
    inset 0 0 0 1px rgba(80,30,10,0.6),
    0 0 18px rgba(255,140,50,0.55),
    0 2px 6px rgba(0,0,0,0.7); }
  50%{ box-shadow:
    inset 0 2px 2px rgba(255,220,160,0.55),
    inset 0 -2px 3px rgba(0,0,0,0.7),
    inset 0 0 0 1px rgba(80,30,10,0.6),
    0 0 24px rgba(255,160,70,0.75),
    0 2px 6px rgba(0,0,0,0.7); }
}
#sb-J::before{
  content:''; position:absolute; inset:5px;
  border-radius:50%;
  border: 1px solid rgba(255,210,140,0.30);
}
#sb-J .lbl{ font-size: 17px; color:#FFEFC0; font-weight: 900; text-shadow: 0 1px 3px #000, 0 0 8px rgba(255,160,80,0.7); }
#sb-J .key{ bottom:6px; right:9px; font-size:9px; }
#sb-J:active, #sb-J.pressed{
  animation: none;
  background:
    radial-gradient(circle at 50% 30%, rgba(255,180,80,0.85) 0%, rgba(220,100,40,0.85) 60%, rgba(120,40,15,0.85) 100%);
  box-shadow:
    inset 0 2px 2px rgba(255,255,200,0.7),
    inset 0 -2px 3px rgba(0,0,0,0.5),
    0 0 32px rgba(255,200,100,0.95),
    0 0 8px rgba(255,255,255,0.6);
}

/* ── 第 2 排：内圈 5 个小技能（半径 78px，环绕 J 上方扇形）──
   J 中心：(53, 61)（J 宽 78/2=39 + right padding 14 ≈ 53，bottom 22+39=61）
   按钮中心 = J 中心 + (r·cos θ, r·sin θ)，θ 从 J 视角逆时针，0°=右
   按钮 right = J.right + r·cos θ - 21（按钮自身 42/2=21）
   按钮 bottom = J.bottom + r·sin θ - 21
   5 个角度（从下到上扇开）：100°, 125°, 150°, 175°, 200°
*/
/* （第二排定义已上移到上方块，此处旧定义清除）*/

/* 大招额外加大一点 */
#sb-U{ width:48px; height:48px; font-size:13px; }

/* 按钮主题色（轻染色，叠加在通用浮雕上方）*/
#sb-U{
  background:
    radial-gradient(circle at 50% 30%, rgba(255,200,80,0.55) 0%, rgba(160,90,20,0.65) 60%, rgba(40,20,5,0.75) 100%);
  border-color: rgba(255,230,140,0.95);
  color: #FFF6C8;
  box-shadow:
    inset 0 1px 2px rgba(255,240,180,0.50),
    inset 0 -1px 2px rgba(0,0,0,0.7),
    0 0 12px rgba(255,200,80,0.5),
    0 1px 4px rgba(0,0,0,0.7);
}
#sb-I{
  background:
    radial-gradient(circle at 50% 30%, rgba(80,140,220,0.50) 0%, rgba(20,50,100,0.65) 60%, rgba(5,15,30,0.75) 100%);
  border-color: rgba(180,220,255,0.85);
  box-shadow:
    inset 0 1px 1px rgba(180,220,255,0.45),
    inset 0 -1px 2px rgba(0,0,0,0.7),
    0 0 8px rgba(100,180,255,0.4),
    0 1px 3px rgba(0,0,0,0.7);
}
#sb-V, #sb-B{
  background:
    radial-gradient(circle at 50% 30%, rgba(160,90,220,0.50) 0%, rgba(70,20,120,0.65) 60%, rgba(20,5,40,0.75) 100%);
  border-color: rgba(220,170,255,0.85);
  box-shadow:
    inset 0 1px 1px rgba(220,170,255,0.45),
    inset 0 -1px 2px rgba(0,0,0,0.7),
    0 0 8px rgba(180,100,240,0.4),
    0 1px 3px rgba(0,0,0,0.7);
}
#sb-K{
  background:
    radial-gradient(circle at 50% 30%, rgba(80,200,170,0.50) 0%, rgba(20,100,80,0.65) 60%, rgba(5,30,25,0.75) 100%);
  border-color: rgba(160,255,220,0.85);
  box-shadow:
    inset 0 1px 1px rgba(160,255,220,0.45),
    inset 0 -1px 2px rgba(0,0,0,0.7),
    0 0 8px rgba(100,220,180,0.4),
    0 1px 3px rgba(0,0,0,0.7);
}
#sb-O, #sb-L{
  background:
    radial-gradient(circle at 50% 30%, rgba(120,200,255,0.50) 0%, rgba(30,90,160,0.65) 60%, rgba(5,20,45,0.75) 100%);
  border-color: rgba(180,230,255,0.85);
  box-shadow:
    inset 0 1px 1px rgba(180,230,255,0.45),
    inset 0 -1px 2px rgba(0,0,0,0.7),
    0 0 8px rgba(120,200,255,0.4),
    0 1px 3px rgba(0,0,0,0.7);
}

  background:

<script>
// ── 常量 ──────────────────────────────────
const TILE = 24;
// 地图 3（血祭十字）：72×48 tiles
const MAP_W = 72, MAP_H = 48;
const CW = 800, CH = 560;

// ── 移动设备性能降级 ─────────────────────────
// 检测：触摸屏 + 窄屏 / UA 包含 mobile
window.IS_MOBILE = (() => {
  try {
    const ua = (navigator.userAgent || '').toLowerCase();
    const touch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    const narrow = window.innerWidth < 900 || window.innerHeight < 700;
    const uaMob = /android|iphone|ipad|ipod|mobile|harmony/i.test(ua);
    return uaMob || (touch && narrow);
  } catch(e){ return false; }
})();
console.log('[perf] IS_MOBILE =', window.IS_MOBILE);

// ── 等距视角参数 ─────────────────────────────
// 世界坐标 (wx,wy) → 屏幕相对原点坐标 (sx,sy)
// 采用 3/4 俯视（非严格等距，哈迪斯风格）
const ISO_Y_SCALE = 0.62;
const ISO_ENABLED = true;  // 可随时关闭调试

// 世界坐标 → 屏幕坐标（相对视口左上角，含相机偏移）
function w2s(wx, wy){
  return {
    x: wx - ox(),
    y: (wy - oy()) * ISO_Y_SCALE
  };
}
// 只转 Y（常用）
function wY(wy){ return (wy - oy()) * ISO_Y_SCALE; }
function wX(wx){ return wx - ox(); }

// 实体的屏幕脚底 Y（用于 Y-sort 和阴影位置）
function screenFootY(wy){ return (wy - oy()) * ISO_Y_SCALE; }

// 相机 Y 也要考虑压缩（视口高对应更大的世界 Y 范围）
// ox()/oy() 仍返回世界坐标偏移，w2s 内部做压缩

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ── 地图 ──────────────────────────────────
// 双层碰撞：
//   map[][]     = 地形（地面/虚空/熔岩） — 任何情况都不可穿
//   mapProps[][]= 装饰柱碰撞 — 冲刺/远程可穿
const map = [];
const mapProps = [];
const tileType = [];
let mapCanvas = null;
let mapReady = false;

// levelProps 在 initMap 里生成后全局可用
let levelProps = [];
// 游戏全局时间（用于篝火闪烁）
let gameTime = 0;

// ── Lucia 召唤状态机（黄金骑士死后触发）──
let luciaSummonState = 'none'; // 'none' | 'pending' | 'pulling' | 'burst' | 'done'
let luciaSummonTimer = 0;
let luciaSummonPos  = null;
let _luciaPreloadStarted = false;

// 给 drawHellAtmosphere 用的 dt（draw里没dt，用上次loop的lastT估算）
let _lastDrawT = 0;
function _atmoDt() {
  const now = performance.now();
  const dt = _lastDrawT === 0 ? 0.016 : Math.min(0.05, (now - _lastDrawT) / 1000);
  _lastDrawT = now;
  return dt;
}

function sR(tx,ty,n){
  const h=Math.sin(tx*127.1+ty*311.7+n*74.3)*43758.5453;
  return h-Math.floor(h);
}

// ─── Lucia 召唤系统：骑士死亡后从尸体处召唤 Lucilla ─────────────
function _checkLuciaSummon(dt){
  if(luciaSummonState === 'none'){
    if(boss && !boss.isLucia && boss.state === 'dead' && (boss.deadAge||0) >= 0.6){
      // 骑士死亡 0.6s 后开始召唤（缩短）
      luciaSummonState = 'pulling';
      luciaSummonTimer = 1.0;       // 1.0s 血色聚集（缩短）
      luciaSummonPos = { x: boss.x, y: boss.y };
      if(!_luciaPreloadStarted && typeof loadLuciaFrames === 'function'){
        _luciaPreloadStarted = true;
        loadLuciaFrames(()=>console.log('[lucia] preload done'));
      }
      camShake(0.2, 5);
      triggerSlowMo(0.5, 0.7);
    }
  }
  else if(luciaSummonState === 'pulling'){
    luciaSummonTimer -= dt;
    const cx = luciaSummonPos.x, cy = luciaSummonPos.y - 18;

    // 聚集粒子（向心吸入）
    if(Math.random() < dt*40){
      const a = Math.random() * Math.PI * 2;
      const r0 = 80 + Math.random()*40;
      const sp = 80 + Math.random()*40;
      addParticle(cx + Math.cos(a)*r0, cy + Math.sin(a)*r0,
        {n:1,
         c: Math.random()<0.7 ? '#990000' : '#FFFFFF',
         spd: sp, r: 2.2 + Math.random()*0.8,
         life: 0.7,
         spread: 0.05,
         angle: a + Math.PI,
         gravity: 0});
    }
    if(Math.random() < dt*4){
      shockwaves.push({x:cx, y:cy, r:50, maxR:8, life:0.4, age:0, c:'#660000'});
    }
    if(luciaSummonTimer <= 0){
      luciaSummonState = 'burst';
      luciaSummonTimer = 0.35;
      // ── 大爆血 + 8 道血色光柱（围绕 Lucia 出现位置）──
      for(let i=0;i<80;i++){
        const a = Math.random()*Math.PI*2;
        addParticle(cx, cy, {
          n:1,
          c: i%4===0 ? '#FFFFFF' : (i%4===1 ? '#FF3030' : '#990000'),
          spd: 200+Math.random()*200,
          r: 2.5+Math.random()*1.5,
          life: 0.7+Math.random()*0.4,
          spread: 0.05,
          angle: a,
          gravity: 40
        });
      }
      // 中央巨型光柱
      _spawnBloodPillar(cx, cy + 4, 1.6, 'huge');
      // 周围 8 道环形分布的血色光柱
      for(let i=0;i<8;i++){
        const a = (i/8) * Math.PI * 2 + Math.random()*0.2;
        const r0 = 50 + Math.random()*30;
        const px = cx + Math.cos(a)*r0;
        const py = cy + 4 + Math.sin(a)*r0*0.4;  // ISO 透视压缩
        _spawnBloodPillar(px, py, 1.2 + Math.random()*0.4);
      }
      shockwaves.push({x:cx, y:cy, r:6, maxR:200, life:0.7, age:0, c:'#990000'});
      shockwaves.push({x:cx, y:cy, r:3, maxR:120, life:0.4, age:0, c:'#FFFFFF'});
      camShake(0.6, 16);
      triggerHitStop(0.18);
      triggerSlowMo(0.5, 0.25);
    }
  }
  else if(luciaSummonState === 'burst'){
    luciaSummonTimer -= dt;
    if(luciaSummonTimer <= 0){
      // 召唤 Lucia，进入 entrance 状态（atk4c → cheer）
      if(typeof spawnLucia === 'function'){
        const luciaObj = spawnLucia(luciaSummonPos.x, luciaSummonPos.y);
        luciaObj.isLucia = true;
        luciaObj.state = 'entrance';        // 自定义入场态
        luciaObj.entrancePhase = 'atk4c';   // 先 atk4c
        luciaObj.entranceT = 0;
        luciaObj.atkCD = 1.0;
        boss = luciaObj;
      }
      luciaSummonState = 'done';
    }
  }
}

// ── 血色光柱粒子柱体 ────────────────────────────────
const _bloodPillars = [];
function _spawnBloodPillar(wx, wy, life, kind){
  _bloodPillars.push({
    x: wx, y: wy,
    age: 0, life: life,
    maxH: kind==='huge' ? 220 : (110 + Math.random()*60),
    width: kind==='huge' ? 50 : (16 + Math.random()*8),
    kind: kind || 'normal',
  });
  // 出柱底冲击粒子
  for(let i=0;i<10;i++){
    const a = -Math.PI*0.5 + (Math.random()-0.5)*0.6;
    addParticle(wx, wy, {n:1, c:i%2?'#FFFFFF':'#CC0000', spd:120+Math.random()*80, r:2.2, life:0.5, spread:0.05, angle:a, gravity:50});
  }
}
function _updateBloodPillars(dt){
  let pi=0;
  for(const p of _bloodPillars){
    p.age += dt;
    if(p.age < p.life) _bloodPillars[pi++] = p;
  }
  _bloodPillars.length = pi;
}
function _drawBloodPillars(){
  for(const p of _bloodPillars){
    const t = p.age / p.life;
    const grow = Math.min(1, t*2.5);          // 上升阶段 (0~0.4)
    const fade = t > 0.4 ? Math.pow(1 - (t-0.4)/0.6, 1.5) : 1;  // 衰减
    const sx = p.x - ox();
    const sy = (p.y - oy()) * ISO_Y_SCALE;
    const h = p.maxH * grow;
    const w = p.width * (0.6 + grow*0.4);
    const alpha = fade;
    if(alpha <= 0.01) continue;

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    // 外圈红色光柱
    const grad = ctx.createLinearGradient(0, sy - h, 0, sy + 8);
    grad.addColorStop(0,   `rgba(255,40,40,0)`);
    grad.addColorStop(0.3, `rgba(255,40,40,${(alpha*0.4).toFixed(3)})`);
    grad.addColorStop(0.7, `rgba(180,10,10,${(alpha*0.7).toFixed(3)})`);
    grad.addColorStop(1,   `rgba(120,0,0,${(alpha*0.5).toFixed(3)})`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(sx, sy - h*0.5 + 4, w, h*0.5, 0, 0, Math.PI*2);
    ctx.fill();
    // 内核白光
    const grad2 = ctx.createLinearGradient(0, sy - h, 0, sy + 4);
    grad2.addColorStop(0,   `rgba(255,200,200,0)`);
    grad2.addColorStop(0.5, `rgba(255,255,255,${(alpha*0.7).toFixed(3)})`);
    grad2.addColorStop(1,   `rgba(255,80,80,${(alpha*0.3).toFixed(3)})`);
    ctx.fillStyle = grad2;
    ctx.beginPath();
    ctx.ellipse(sx, sy - h*0.5 + 4, w*0.35, h*0.5, 0, 0, Math.PI*2);
    ctx.fill();
    // 底部地面光晕
    const baseG = ctx.createRadialGradient(sx, sy + 4, 0, sx, sy + 4, w*1.6);
    baseG.addColorStop(0, `rgba(255,30,30,${(alpha*0.5).toFixed(3)})`);
    baseG.addColorStop(1, 'rgba(120,0,0,0)');
    ctx.fillStyle = baseG;
    ctx.beginPath();
    ctx.ellipse(sx, sy + 4, w*1.6, w*0.6, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function buildMap(){
  // 初始化双层地图数组
  for(let y=0;y<MAP_H;y++){
    map[y]=[]; mapProps[y]=[]; tileType[y]=[];
    for(let x=0;x<MAP_W;x++){ map[y][x]=0; mapProps[y][x]=0; tileType[y][x]='.'; }
  }
}

function initMapImage(onReady){
  buildMap();

  mapCanvas = document.createElement('canvas');
  mapCanvas.width  = MAP_W * TILE;
  mapCanvas.height = MAP_H * TILE;
  const mc = mapCanvas.getContext('2d');
  mc.imageSmoothingEnabled = false;

  // 关卡选择：默认 level_3（新地图），?level=2 切换旧关卡
  const _lvParam = (new URLSearchParams(location.search)).get('level');
  if(_lvParam === '2' && typeof LEVEL2_MASK !== 'undefined'){
    window._activeGroundMask  = LEVEL2_MASK;
    window._activeGroundMaskW = LEVEL2_MASK_W;
    window._activeGroundMaskH = LEVEL2_MASK_H;
    window._activeGroundUrl   = 'ground2_clean.png';
    console.log('[level] 切换到关卡 2');
    if(typeof LEVEL_2 !== 'undefined' && LEVEL_2.spawnPoint){
      player.x = LEVEL_2.spawnPoint.x;
      player.y = LEVEL_2.spawnPoint.y;
    }
  } else if(typeof LEVEL_3 !== 'undefined'){
    // 关卡 3 默认：把 mapData 写入碰撞表
    window._activeGroundUrl = 'ground3_clean.png';
    // 用 LEVEL_3.mapData 覆盖 map[][]（在 buildMap 之后）
    window._pendingMapData = LEVEL_3.mapData;
    // 玩家出生点
    player.x = LEVEL_3.spawnPoint.x;
    player.y = LEVEL_3.spawnPoint.y;
    console.log('[level] 关卡 3 — 血祭十字');
  }

  // 加载图集，加载完成后构建关卡
  loadAtlas(() => {
    finishMap(mc, onReady);
  });
}

function finishMap(mc, onReady) {
  // ── Step 1: 用 ground.png 铺底 ──
  drawBaseGround(mc, MAP_W, MAP_H);

  // ── Step 2: 由 ground alpha 写碰撞（透明=不可走）──
  applyGroundCollision(map, MAP_W, MAP_H);

  // 关卡 3：用 mapData 覆盖碰撞表（比 ground alpha 更精确）
  if(window._pendingMapData){
    const md = window._pendingMapData;
    const mw = LEVEL_3.mapW, mh = LEVEL_3.mapH;
    for(let ty=0;ty<mh&&ty<MAP_H;ty++)
      for(let tx=0;tx<mw&&tx<MAP_W;tx++)
        map[ty][tx] = md[ty][tx];
    console.log('[map] level3 mapData applied');
    window._pendingMapData = null;
  }

  // ── Step 2.5: 出生点保护（若落在不可走，找最近可走tile）──
  const findWalkable = (tx0, ty0) => {
    if(map[ty0]&&map[ty0][tx0]===0) return [tx0, ty0];
    for(let r=1; r<20; r++) for(let dy=-r; dy<=r; dy++) for(let dx=-r; dx<=r; dx++) {
      const tx=tx0+dx, ty=ty0+dy;
      if(map[ty]&&map[ty][tx]===0) return [tx, ty];
    }
    return [tx0, ty0];
  };

  // 调试：打印竞技场中心附近的可走区域
  if(window.LUCIA_START_PHASE){
    let walkLog = [];
    for(let ty=20;ty<=30;ty++) for(let tx=44;tx<=64;tx++){
      if(map[ty]&&map[ty][tx]===0) walkLog.push(`(${tx},${ty})`);
    }
    console.log('[map] walkable arena tiles:', walkLog.join(' '));
  }

  const [pTx2, pTy2] = findWalkable(Math.floor(player.x/TILE), Math.floor(player.y/TILE));
  player.x = pTx2*TILE + TILE/2;
  player.y = pTy2*TILE + TILE/2;
  console.log('[spawn] player at tile', Math.floor(player.x/TILE), Math.floor(player.y/TILE));

  // ── Step 3: 生成关卡装饰布局（关卡3跳过，避免黑块）──
  const playerSpawn = { x: player.x, y: player.y };
  const bossSpawn   = { x: 36*TILE, y: 10*TILE };
  if(typeof LEVEL_3 === 'undefined'){
    levelProps = generateLevelProps(playerSpawn, bossSpawn);
  } else {
    levelProps = [];   // level3 不自动生成装饰
  }

  // ── Step 4: 装饰物 solid 写入独立 mapProps（不污染地形 map）──
  applyPropsToMap(mapProps, levelProps);
  for(let y=0;y<MAP_H;y++) for(let x=0;x<MAP_W;x++)
    tileType[y][x] = (map[y][x]===1 || mapProps[y][x]===1) ? '#' : '.';

  // ── Step 5: 烘焙 stone 装饰到 mapCanvas ──
  drawPropsToCanvas(mc, levelProps);

  // ── Step 6: 后处理：阴影/光晕/vignette ──
  postprocessMapCanvas(mc);

  mapReady = true;
  if(onReady) onReady();
}

// 静态后处理：仅做轻量氛围（ground.png 已含完整美术，不重复加阴影）
function postprocessMapCanvas(mc){
  const T = TILE;
  // 全局轻 vignette（中心亮，外围暗）
  const vignette = mc.createRadialGradient(
    MAP_W*T*0.5, MAP_H*T*0.5, MAP_W*T*0.25,
    MAP_W*T*0.5, MAP_H*T*0.5, MAP_W*T*0.7
  );
  vignette.addColorStop(0, 'rgba(0,0,0,0)');
  vignette.addColorStop(1, 'rgba(0,0,0,0.35)');
  mc.fillStyle = vignette;
  mc.fillRect(0, 0, MAP_W*T, MAP_H*T);
}
// solid() 普通行走：地形+装饰都阻挡
function solid(wx,wy){
  const tx=Math.floor(wx/TILE), ty=Math.floor(wy/TILE);
  if(tx<0||ty<0||tx>=MAP_W||ty>=MAP_H)return true;
  return map[ty][tx]===1 || mapProps[ty][tx]===1;
}
// solidTerrain() 冲刺/远程：仅地形阻挡，装饰可穿
function solidTerrain(wx,wy){
  const tx=Math.floor(wx/TILE), ty=Math.floor(wy/TILE);
  if(tx<0||ty<0||tx>=MAP_W||ty>=MAP_H)return true;
  return map[ty][tx]===1;
}
function moveAxis(obj,dx,dy,r,passThruProps){
  // passThruProps=true → 仅检测地形（冲刺穿装饰但不出地图）
  const collide = passThruProps ? solidTerrain : solid;
  // X轴
  if(dx!==0){
    const nx=obj.x+dx;
    if(!collide(nx+r,obj.y+r)&&!collide(nx+r,obj.y-r)&&
       !collide(nx-r,obj.y+r)&&!collide(nx-r,obj.y-r))
      obj.x=nx;
  }
  // Y轴
  if(dy!==0){
    const ny=obj.y+dy;
    if(!collide(obj.x+r,ny+r)&&!collide(obj.x+r,ny-r)&&
       !collide(obj.x-r,ny+r)&&!collide(obj.x-r,ny-r))
      obj.y=ny;
  }
}

// ── 实体间碰撞推开（防止角色重合）────────────────
// 收集所有实体，两两检测，超出半径和则沿法线推开
// 重量：boss=4, player=2, enemy=1（轻的更易被推开）
function resolveEntityCollisions(){
  const ents = [];
  // 玩家（dash中不参与，避免影响冲刺手感）
  if(player.dashDur<=0) ents.push({o:player, r:P_R+2, w:2});
  // 敌人
  for(const e of enemies){
    if(e.state==='dead') continue;
    ents.push({o:e, r:P_R+2, w:1});
  }
  // Boss（charge中不参与，避免冲撞破解）
  if(boss && boss.state!=='dead' && boss.state!=='charge'){
    ents.push({o:boss, r:BOSS_R+4, w:4});
  }

  // 两两检测推开
  for(let i=0;i<ents.length;i++){
    for(let j=i+1;j<ents.length;j++){
      const a=ents[i], b=ents[j];
      const dx=b.o.x-a.o.x, dy=b.o.y-a.o.y;
      const dist=Math.hypot(dx,dy);
      const minD=a.r+b.r;
      if(dist>=minD) continue;
      // 重叠：沿法线分推
      const overlap=minD-dist;
      let nx,ny;
      if(dist<0.001){ nx=Math.cos(i*1.7); ny=Math.sin(i*1.7); }
      else { nx=dx/dist; ny=dy/dist; }
      // 重量比例分配推力
      const totalW=a.w+b.w;
      const pushA=overlap*(b.w/totalW);
      const pushB=overlap*(a.w/totalW);
      // 推开（仍受地形阻挡）
      // 推开 A（仍受地形阻挡）— 记录每轴是否成功
      const aNx=a.o.x-nx*pushA, aNy=a.o.y-ny*pushA;
      let aMovedX=false, aMovedY=false;
      if(!solidTerrain(aNx,a.o.y)){ a.o.x=aNx; aMovedX=true; }
      if(!solidTerrain(a.o.x,aNy)){ a.o.y=aNy; aMovedY=true; }
      // A 被墙卡住的轴 → 由 B 补偿（避免 A 被永久压进墙角）
      const compX = aMovedX ? 0 : pushA;
      const compY = aMovedY ? 0 : pushA;
      const bNx=b.o.x+nx*(pushB+compX), bNy=b.o.y+ny*(pushB+compY);
      let bMovedX=false, bMovedY=false;
      if(!solidTerrain(bNx,b.o.y)){ b.o.x=bNx; bMovedX=true; }
      if(!solidTerrain(b.o.x,bNy)){ b.o.y=bNy; bMovedY=true; }
      // A/B 双方都卡住的轴 → 切向滑动（沿墙边平移，避免完全锁死）
      if(!aMovedX && !bMovedX){
        // 沿 Y 法线小位移让 A 滑出
        const slide = 1.5;
        const sy1 = a.o.y + slide;
        const sy2 = a.o.y - slide;
        if(!solidTerrain(a.o.x, sy1)) a.o.y = sy1;
        else if(!solidTerrain(a.o.x, sy2)) a.o.y = sy2;
      }
      if(!aMovedY && !bMovedY){
        const slide = 1.5;
        const sx1 = a.o.x + slide;
        const sx2 = a.o.x - slide;
        if(!solidTerrain(sx1, a.o.y)) a.o.x = sx1;
        else if(!solidTerrain(sx2, a.o.y)) a.o.x = sx2;
      }
    }
  }
}

const cam={x:0,y:0,tx:0,ty:0,shX:0,shY:0,shDur:0,shAge:0,shAmp:0};
function camShake(dur,amp){cam.shDur=dur;cam.shAge=0;cam.shAmp=amp;}
function updateCam(px,py,dt){
  // 玩家在屏幕正中（zoom 以屏幕中心缩放，所以直接把玩家对到中心即可）
  cam.tx=px-CW/2; cam.ty=py-CH/(2*ISO_Y_SCALE);
  cam.tx=Math.max(0,Math.min(MAP_W*TILE-CW,cam.tx));
  cam.ty=Math.max(0,Math.min(MAP_H*TILE-CH/ISO_Y_SCALE,cam.ty));
  // 平滑跟随
  cam.x+=(cam.tx-cam.x)*(1-Math.pow(0.01,dt));
  cam.y+=(cam.ty-cam.y)*(1-Math.pow(0.01,dt));
  // 震动
  if(cam.shAge<cam.shDur){
    cam.shAge+=dt;
    const t=1-cam.shAge/cam.shDur;
    cam.shX=(Math.random()-0.5)*2*cam.shAmp*t;
    cam.shY=(Math.random()-0.5)*2*cam.shAmp*t;
  }else{cam.shX=0;cam.shY=0;}
}
function ox(){return Math.floor(cam.x+cam.shX);}
function oy(){return Math.floor(cam.y+cam.shY);}

// hex 颜色 → rgba 字符串（用于冲击波等需要透明度的场景）
function hexToRgba(hex, a){
  const h = hex.replace('#','');
  const len = h.length;
  if(len===3){
    const r=parseInt(h[0]+h[0],16),g=parseInt(h[1]+h[1],16),b=parseInt(h[2]+h[2],16);
    return `rgba(${r},${g},${b},${a.toFixed(3)})`;
  }
  const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
  return `rgba(${r},${g},${b},${a.toFixed(3)})`;
}

function doDash(){
  if(defend.active) return;
  if(player.dashCooldown>0||player.dashDur>0)return;
  // role3 冲刺：不消耗剑、距离更长、CD 短

  if(typeof _addFxShape === 'function'){

    const fxFx = player.x + player.facing*28;
    const fyFx = player.y - 24;     // 剑刃高度（player.y 是脚底，CHAR_H=28，-24 ≈ 上身）
    _addFxShape('crescent', fxFx, fyFx, {
      r: 32 + comboIndex*6,
      startAng: player.facing > 0 ? 0 : Math.PI,
      sweep: arc,
      thickness: 9 + comboIndex*2,
      palette: 'white',
      life: 0.3 + comboIndex*0.04
    });
    if(comboIndex === 2){
      _addFxShape('slashgash', fxFx, fyFx, {
        angle: -0.5 * player.facing,
        len: 60, thickness: 9,
        palette: 'white',
        life: 0.32
      });

  }
  // 大招期间额外射出弧光
  if(ult.active) spawnUltSlash(fx,fy,player.facing);
  hitEnemiesInRange(fx,fy,32);
  if(boss&&boss.state!=='dead'){

      hitBoss(dmg,fx-boss.x,fy-boss.y);

  // Lucia P3 分身命中
  if(boss && boss.isLucia && typeof luciaTryHitClone === 'function'){
    luciaTryHitClone(fx, fy, 32, 18+Math.floor(Math.random()*12), 1, 0);
  }
}

function doAttack(){
  if(defend.active) return;
  // 攻击前自动朝向 boss，避免打空气
  if(boss && boss.state !== 'dead' && !(K['KeyA']||K['KeyD']||K['ArrowLeft']||K['ArrowRight']||K['KeyW']||K['KeyS'])){
    player.facing = boss.x > player.x ? 1 : -1;
  }
  // role3：J = atk1（射剑回旋）
  if(currentChar === 3 && window.role3){
    // role3 攻击中：如果动画剩余时间 < 0.15s，缓冲下一刀
    if(player.state === 'attack' && player.stateTimer > 0.15){
      attackBuffered = true;
      return;
    }
    window.role3.doAtk1();
    return;
  }
  if(player.state==='attack'){
    attackBuffered=true; // 动画中点击 → 缓冲，动画结束自动接
    return;
  }
  execAttack();
}

// 防御拦截：被调用时若防御激活则触发格挡爆点
// dmgX/dmgY = 伤害来源方向（用于击退方向）
// 返回 true 则伤害被格挡
function defendBlock(dmgX, dmgY){
  if(!defend.active) return false;
  if(defend.parried) return true; // 已格挡过，继续保护但不再爆点

  defend.parried = true;
  const isPerfect = defend.timer > (DEF_DUR - DEF_PARRY_WINDOW);
  defend.blockFlash = isPerfect ? 0.45 : 0.28; // 高亮时长

  // ── 爆点特效：在玩家身体中心爆发 ──
  const fx = player.x;
  const fy = player.y - 22;
  const burstC = isPerfect ? '#FFFFFF' : '#AADDFF';
  const burstN = isPerfect ? 20 : 10;      // 原60/30 → 1/3
  const burstR = isPerfect ? 73 : 43;      // 原220/130 → 1/3

  addParticle(fx,fy,{n:burstN,  c:burstC,    spd:burstR,   r:2,  life:0.4, spread:Math.PI*2});
  addParticle(fx,fy,{n:burstN/2,c:'#44CCFF', spd:burstR*0.6,r:1.5,life:0.3,spread:Math.PI*2});
  if(isPerfect)
    addParticle(fx,fy,{n:7, c:'#FFD700', spd:53, r:2, life:0.4, spread:Math.PI*2});

  shockwaves.push({x:fx,y:fy,r:4, maxR:isPerfect?73:47, life:isPerfect?0.45:0.30, age:0,c:burstC});
  shockwaves.push({x:fx,y:fy,r:2, maxR:27,  life:0.2, age:0,c:'#FFFFFF'});

  // ── 震屏 + 顿帧 + 慢放 ──
  camShake(isPerfect?0.55:0.35, isPerfect?20:12);
  triggerHitStop(isPerfect?0.14:0.08);          // 先冻几帧
  triggerSlowMo(isPerfect?0.40:0.22, isPerfect?0.06:0.12); // 再慢放

  // ── 玩家击退（弹开方向：远离来源）──
  const dx = player.x - dmgX, dy = player.y - dmgY;
  const dl = Math.hypot(dx,dy)||1;
  const repulseP = isPerfect ? 280 : 160;
  player.vx = dx/dl * repulseP;
  player.vy = dy/dl * repulseP;

  // ── Boss / 敌人击退 ──
  if(boss && boss.state!=='dead'){
    const bdx = boss.x - player.x, bdy = boss.y - player.y;
    const bl   = Math.hypot(bdx,bdy)||1;
    const repulseB = isPerfect ? 380 : 220;
    boss.vx = bdx/bl * repulseB;
    boss.vy = bdy/bl * repulseB;
    boss.state = 'hurt'; boss.stateTimer = isPerfect ? 0.45 : 0.25;
    boss.hurtTimer = isPerfect ? 0.4 : 0.22;
    // 完美格挡额外扣少量血（反震效果）
    if(isPerfect){
      const cntDmg = 12 + Math.floor(Math.random()*8);
      boss.hp = Math.max(0, boss.hp - cntDmg);
      if(dmgNums.length < DMGNUM_MAX)
        dmgNums.push({x:boss.x,y:boss.y-BOSS_H-5,val:cntDmg,age:0,life:0.9,vy:-55});
    }
  }

  // role3 连携：格挡成功计数（I轴：每3次→M，每3次M→N）
  if(currentChar === 3 && window.role3 && typeof window.role3.onIBlock === 'function'){
    window.role3.onIBlock();
  }
  // 法宝系统：格挡事件
  if(window.Events) window.Events.emit('player:block', isPerfect);

  // role3 专属：完美格挡触发飞剑反击 + 获得 1 把剑
  if(isPerfect && currentChar === 3){
    if(window.role3 && typeof window.role3.gainSword === 'function'){
      window.role3.gainSword();
    }
    if(typeof role3Swords !== 'undefined'){
      const cAng = Math.atan2(dmgY - player.y, dmgX - player.x);
      const orbits = role3SwordsAPI.getOrbits();
      orbits.forEach((s, i) => {
        s.state = 'shoot';
        const spread = 0.5;
        s.shootAngle = cAng + (i - (orbits.length-1)/2) / Math.max(1, orbits.length-1) * spread;
        s.shootSpd = 600;
        s.dmg = 30;
        s.kx = Math.cos(s.shootAngle) * 280;
        s.ky = Math.sin(s.shootAngle) * 280;
        s.age = 0;
        s.life = 0.55;
        s.trail = [];
        s._hitMap = {};
        s._hitTimer = 0;
        s.returnTo = player;
      });
      if(typeof _addFxShape === 'function'){
        _addFxShape('crescent', player.x, player.y - 22, {
          r: 36, startAng: cAng - Math.PI*0.4,
          sweep: Math.PI*0.8, thickness: 8, palette: 'white', life: 0.35
        });
      }
    }
  }

  return true;
}

function updateDefend(dt){
  if(defend.cooldown > 0) defend.cooldown = Math.max(0, defend.cooldown - dt);
  if(defend.blockFlash > 0) defend.blockFlash = Math.max(0, defend.blockFlash - dt);
  if(!defend.active) return;
  defend.timer -= dt;
  if(defend.timer <= 0){
    defend.active = false;
    defend.timer  = 0;
    if(player.state==='defend') player.state='idle';
    if(typeof _role3RestoreDefend === 'function') _role3RestoreDefend();
  }
}

function doHolyCharge(){

  if(typeof moveAxis === 'function'){
    moveAxis(player, dirX * 90, 0, P_R, true);
  } else {
    player.x = targetX;
  }
  // 沿轨迹白色 abyssrift（视觉冲锋线）
  if(typeof _addFxShape === 'function'){
    const mx = (startX + player.x) * 0.5;
    const my = startY - 16;

      angle: 0.3 * dirX, len: 70, thickness: 11,
      palette: 'white', life: 0.30
    });

  // 沿冲锋路径全段命中
  const segments = 5;
  for(let i=0; i<=segments; i++){
    const t = i/segments;
    const fx = startX + (player.x - startX) * t;
    const fy = startY - 10;

      n:1, c: i%3===0?'#FFFFFF':(i%2?'#AAEEFF':'#FFD060'),

      spread: 0.8, angle: Math.random()*Math.PI*2, gravity: 30

  triggerHitStop(0.08);

  // 护盾/冲刺/普攻 CD 立即重置
  shield.cooldown     = 0;
  player.dashCooldown = 0;
}

// 大招激活期间，技能CD自动加速消耗
function updateUlt(dt){
  if(ult.cooldown>0) ult.cooldown=Math.max(0,ult.cooldown-dt);
  if(!ult.active) return;

  ult.timer   -= dt;
  ult.burstAge+= dt;

  if(ult.timer<=0){
    ult.active=false;
    ult.timer=0;
    // 结束时小爆发
    addParticle(player.x,player.y-24,{n:30,c:'#FFD700',spd:130,r:2.5,life:0.5,spread:Math.PI*2});
    shockwaves.push({x:player.x,y:player.y-24,r:6,maxR:90,life:0.35,age:0,c:'#FFD700'});
    return;
  }

  // 技能冷却加速（每帧额外扣减）
  const cdBoost = dt*(1/ULT_CD_REDUCTION - 1); // 等效于CD流逝速度变快
  if(shield.cooldown>0)      shield.cooldown      = Math.max(0,shield.cooldown-cdBoost);
  if(player.dashCooldown>0)  player.dashCooldown  = Math.max(0,player.dashCooldown-cdBoost);

  // 爆气持续粒子（轻量）
  if(Math.random()<dt*20){
    const a=Math.random()*Math.PI*2;
    const r=22+Math.random()*12;
    addParticle(player.x+Math.cos(a)*r, player.y-20+Math.sin(a)*r*0.5,
      {n:1,c:Math.random()<0.5?'#FFD700':'#FF8800',spd:35,r:2,life:0.4,
       spread:Math.PI*0.3,angle:-Math.PI/2});
  }

  // 护盾激活期间加速：在 updatePlayer 里处理
}

// ── 大招：普攻圆弧剑光 ──────────────────────
// 4种形状轮转：扇形 / 十字 / 螺旋双弧 / 环形爆
// ── 玩家弹丸系统 ──────────────────────────────
const playerProjectiles = [];

function updatePlayerProjectiles(dt){
  let pi=0;
  for(let i=0;i<playerProjectiles.length;i++){
    const p=playerProjectiles[i];
    p.age+=dt;
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.spinA=(p.spinA||0)+p.spinSpd*dt; // 月牙自旋
    if(p.trail){p.trail.push({x:p.x,y:p.y,a:p.spinA});if(p.trail.length>14)p.trail.shift();}

    // 命中boss
    if(boss&&boss.state!=='dead'&&Math.hypot(boss.x-p.x,boss.y-p.y)<BOSS_HIT_R+p.r){
      hitBoss(p.dmg,p.vx,p.vy);
      _crescentHitFX(p.x,p.y);
      continue;
    }
    // Lucia 分身命中
    if(boss && boss.isLucia && typeof luciaTryHitClone === 'function'){
      if(luciaTryHitClone(p.x, p.y, p.r+8, p.dmg, p.vx, p.vy)){
        _crescentHitFX(p.x,p.y);
        continue;
      }
    }
    // 命中敌人
    let hit=false;
    for(const e of enemies){
      if(e.state==='dead'||e.hurtTimer>0) continue;
      if(Math.hypot(e.x-p.x,e.y-p.y)<P_R*3+p.r){
        const dmg=p.dmg+Math.floor(Math.random()*6);
        e.hp-=dmg; e.hurtTimer=0.25;
        combo++; comboTimer=COMBO_RESET; comboPeak=Math.max(comboPeak,combo);
        if(dmgNums.length<DMGNUM_MAX)
          dmgNums.push({x:e.x,y:e.y-30,val:dmg,age:0,life:0.8,vy:-40});
        _crescentHitFX(p.x,p.y);
        hit=true; break;
      }
    }
    if(hit) continue;
    // 远程穿透地形：仅按生命周期判存活
    if(p.age<p.life){
      playerProjectiles[pi++]=p;
    }
  }
  playerProjectiles.length=pi;
}

// 月牙命中爆散特效（蓝白）

  addParticle(x,y,{n:16,c:'#55DDFF',spd:120,r:2.5,life:0.35,spread:Math.PI*2});

// ── 月牙刀光：4种形态，全蓝白色系 ────────────
// shape=0: 单发大月牙
// shape=1: 双月牙（上下微散）
// shape=2: 三连月牙（扇形）
// shape=3: 旋转双月牙（夹角大）
function spawnUltSlash(x, y, facing){
  const shape = ult.slashShape % 4;
  ult.slashShape++;
  const baseAngle = facing > 0 ? 0 : Math.PI;
  const spinDir = facing > 0 ? 1 : -1;

  const mkCrescent = (a, r, dmg, spd, spinSpd)=>({
    x, y,
    vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
    r, dmg, life: 0.75, age: 0, trail: [],
    angle: a, spinA: 0, spinSpd,
    type: 'crescent',
  });

  if(shape===0){
    // 单发大月牙：厚重感
    playerProjectiles.push(mkCrescent(baseAngle, 18, 28, 460, spinDir*4.5));
    addParticle(x,y,{n:20,c:'#44CCFF',spd:160,r:2.5,life:0.25,spread:0.5,angle:baseAngle});
    shockwaves.push({x,y,r:3,maxR:45,life:0.2,age:0,c:'#44CCFF'});

  }else if(shape===1){
    // 双月牙：上下微散
    [-0.18,0.18].forEach(off=>{
      playerProjectiles.push(mkCrescent(baseAngle+off, 14, 20, 420, spinDir*(3.5+off*2)));
    });
    addParticle(x,y,{n:16,c:'#66DDFF',spd:140,r:2,life:0.22,spread:0.45,angle:baseAngle});

  }else if(shape===2){
    // 三连扇形月牙
    [-0.28, 0, 0.28].forEach((off,i)=>{
      playerProjectiles.push(mkCrescent(baseAngle+off, 12, 16, 390+i*20, spinDir*4));
    });
    addParticle(x,y,{n:18,c:'#AAEEFF',spd:130,r:2,life:0.22,spread:0.65,angle:baseAngle});

  }else{
    // 旋转双月牙：夹角大，绕行感
    [-0.45, 0.45].forEach(off=>{
      playerProjectiles.push(mkCrescent(baseAngle+off, 15, 22, 400, spinDir*6));
    });
    shockwaves.push({x,y,r:2,maxR:36,life:0.18,age:0,c:'#88EEFF'});
    addParticle(x,y,{n:14,c:'#FFFFFF',spd:120,r:1.5,life:0.2,spread:0.9,angle:baseAngle});
  }
}

function updateShield(dt){

function drawShield(){
  if(!shield.active) return;
  const sx=Math.floor(player.x-ox());
  const sy=Math.floor((player.y-oy())*ISO_Y_SCALE);
  const cy=sy-22;   // 护盾中心（角色中部）
  const baseR=26;
  const pulse=Math.sin(shield.pulseT*4)*3;
  const r=baseR+pulse;
  const isFlash=shield.blockFlash>0;
  const flashT=isFlash?shield.blockFlash/0.35:0;

  ctx.save();
  // ── 外圈光晕 ──
  const glow=ctx.createRadialGradient(sx,cy,r*0.5,sx,cy,r*1.6);
  if(isFlash){
    glow.addColorStop(0,'rgba(160,240,255,'+( 0.35+flashT*0.4)+')');
    glow.addColorStop(1,'rgba(0,180,255,0)');
  } else {
    glow.addColorStop(0,'rgba(40,160,255,'+(0.18+Math.sin(shield.pulseT*4)*0.06)+')');
    glow.addColorStop(1,'rgba(0,100,200,0)');
  }
  ctx.fillStyle=glow;
  ctx.beginPath();ctx.arc(sx,cy,r*1.6,0,Math.PI*2);ctx.fill();

  // ── 六边形护盾面 ──
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a=i/6*Math.PI*2-Math.PI/6;
    const hx=sx+Math.cos(a)*r, hy=cy+Math.sin(a)*r;
    i===0?ctx.moveTo(hx,hy):ctx.lineTo(hx,hy);
  }
  ctx.closePath();
  // 蓝色半透明填充
  const fillAlpha=isFlash?0.55+flashT*0.3:0.18+Math.sin(shield.pulseT*3)*0.06;
  ctx.fillStyle=isFlash?`rgba(160,240,255,${fillAlpha})`:`rgba(30,140,255,${fillAlpha})`;
  ctx.fill();
  // 六边形边框
  const strokeAlpha=isFlash?0.95:0.55+Math.sin(shield.pulseT*5)*0.15;
  ctx.strokeStyle=isFlash?`rgba(220,250,255,${strokeAlpha})`:`rgba(80,200,255,${strokeAlpha})`;
  ctx.lineWidth=isFlash?2.5:1.5;
  ctx.stroke();

  // ── 格挡闪光：白色覆盖光爆 ──
  if(isFlash){
    ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha=flashT*0.6;
    ctx.fillStyle='#AAEEFF';
    ctx.beginPath();ctx.arc(sx,cy,r*1.2,0,Math.PI*2);ctx.fill();
    ctx.globalCompositeOperation='source-over';
    ctx.globalAlpha=1;
  }

  // ── 护盾剩余时间小弧 ──
  const frac=Math.max(0,shield.dur/SHIELD_DUR);
  ctx.beginPath();
  ctx.arc(sx,cy,r+4,-Math.PI/2,-Math.PI/2+frac*Math.PI*2);
  ctx.strokeStyle='rgba(120,220,255,0.7)';
  ctx.lineWidth=2;
  ctx.stroke();

  ctx.restore();
}

const ENEMY_DETECT=120, ENEMY_LOSE=220, ENEMY_ATK_R=26;
const ENEMY_PATROL_SPD=21, ENEMY_CHASE_SPD=54;

function spawnEnemy(x,y){
  enemies.push({
    x,y,vx:0,vy:0,facing:1,
    hp:80,maxHp:80,
    state:'patrol',  // patrol|chase|attack|hurt|dead
    stateTimer:0,
    atkCooldown:0,
    hurtTimer:0,     // 受伤无敌帧
    spawnX:x,spawnY:y,
    wpX:x,wpY:y,wpWait:0,
    animT:0,
    deadAge:0,
  });
}

function initEnemies(){
  // 等地图就绪后在可走位置生成（异步调用）
  const candidates=[];
  for(let ty=2;ty<MAP_H-2;ty++) for(let tx=2;tx<MAP_W-2;tx++){
    if(map[ty]&&map[ty][tx]===0) candidates.push([tx*TILE+TILE/2,ty*TILE+TILE/2]);
  }
  // 随机挑 8 个，间距 > 5 tiles
  const chosen=[];
  for(let i=0;i<candidates.length&&chosen.length<8;i++){
    const idx=Math.floor(Math.random()*candidates.length);
    const [cx,cy]=candidates[idx];
    // 离玩家出生点 > 6 tiles
    if(Math.hypot(cx-player.x,cy-player.y)<6*TILE) continue;
    // 互相间距
    if(chosen.some(([ex,ey])=>Math.hypot(cx-ex,cy-ey)<5*TILE)) continue;
    chosen.push([cx,cy]);
    spawnEnemy(cx,cy);
  }
}

function hitEnemiesInRange(ax,ay,hitR){
  for(const e of enemies){
    if(e.state==='dead'||e.hurtTimer>0) continue;
    if(Math.hypot(e.x-ax,e.y-ay)>hitR) continue;
    // 命中
    const dmg=18+Math.floor(Math.random()*12);
    e.hp-=dmg;
    e.hurtTimer=0.25;
    combo++; comboTimer=COMBO_RESET; comboPeak=Math.max(comboPeak,combo);
    if(dmgNums.length<DMGNUM_MAX)
      dmgNums.push({x:e.x,y:e.y-30,val:dmg,age:0,life:0.8,vy:-40});
    // 击退
    const kx=e.x-player.x, ky=e.y-player.y;
    const kl=Math.hypot(kx,ky)||1;
    e.vx=kx/kl*220; e.vy=ky/kl*220;
    if(e.hp<=0){
      e.state='dead'; e.stateTimer=0.5;
      // 击飞：死亡时给一个向外大速度 + 上抛（击飞感）
      const kxN = e.x-ax, kyN = e.y-ay;
      const klN = Math.hypot(kxN,kyN)||1;
      e.vx = kxN/klN*340; e.vy = kyN/klN*340;
      addParticle(e.x,e.y-20,{n:14,c:'#66FF88',spd:70,r:2,life:0.5,spread:Math.PI*2});
      addParticle(e.x,e.y-20,{n:6,c:'#FFFFFF',spd:40,r:1,life:0.3,spread:Math.PI*2});
    } else {
      e.state='hurt'; e.stateTimer=0.22;
    }
  }
}

function updateEnemies(dt){
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    if(e.stateTimer>0) e.stateTimer-=dt;
    if(e.atkCooldown>0) e.atkCooldown-=dt;
    if(e.hurtTimer>0) e.hurtTimer-=dt;
    e.animT+=dt;

    if(e.state==='dead'){
      e.deadAge+=dt;
      // 缓慢淡出后移除
      e.vx*=Math.pow(0.001,dt); e.vy*=Math.pow(0.001,dt);
      if(e.stateTimer<=0) enemies.splice(i,1);
      continue;
    }

    const pdx=player.x-e.x, pdy=player.y-e.y;
    const pdist=Math.hypot(pdx,pdy);

    if(e.state==='hurt'){
      // 击退滑行
      moveAxis(e,e.vx*dt,e.vy*dt,P_R);
      e.vx*=Math.pow(0.005,dt*4); e.vy*=Math.pow(0.005,dt*4);
      if(e.stateTimer<=0) e.state=pdist<ENEMY_LOSE?'chase':'patrol';

    } else if(pdist<ENEMY_ATK_R && e.atkCooldown<=0){
      // 攻击
      e.state='attack'; e.stateTimer=0.45; e.atkCooldown=1.8;
      e.facing=pdx>0?1:-1;
      // 对玩家造成伤害（若玩家未在无敌帧）
      if(playerHurtTimer<=0){
        hurtPlayer(12,-pdx,-pdy);
      }

    } else if(e.state==='attack'){
      if(e.stateTimer<=0) e.state=pdist<ENEMY_LOSE?'chase':'patrol';

    } else if(pdist<ENEMY_DETECT || e.state==='chase'){
      // 追击
      if(pdist>ENEMY_LOSE){ e.state='patrol'; }
      else{
        e.state='chase';
        e.facing=pdx>0?1:-1;
        const ndx=pdx/pdist, ndy=pdy/pdist;
        e.vx+=(ndx*ENEMY_CHASE_SPD-e.vx)*Math.min(1,18*dt);
        e.vy+=(ndy*ENEMY_CHASE_SPD-e.vy)*Math.min(1,18*dt);
        moveAxis(e,e.vx*dt,e.vy*dt,P_R);
      }

    } else {
      // 巡逻
      e.state='patrol';
      e.wpWait-=dt;
      if(e.wpWait<=0){
        const angle=Math.random()*Math.PI*2;
        const rad=20+Math.random()*50;
        e.wpX=e.spawnX+Math.cos(angle)*rad;
        e.wpY=e.spawnY+Math.sin(angle)*rad;
        e.wpWait=1.5+Math.random()*2;
      }
      const wdx=e.wpX-e.x, wdy=e.wpY-e.y;
      const wd=Math.hypot(wdx,wdy);
      if(wd>6){
        e.facing=wdx>0?1:-1;
        const spd=ENEMY_PATROL_SPD;
        e.vx=wdx/wd*spd; e.vy=wdy/wd*spd;
        moveAxis(e,e.vx*dt,e.vy*dt,P_R);
      } else { e.vx=0;e.vy=0; }
    }
  }

  // 玩家无敌帧
  if(playerHurtTimer>0) playerHurtTimer-=dt;

  // 伤害数字更新（in-place）
  let di=0;
  for(let i=0;i<dmgNums.length;i++){
    const d=dmgNums[i];
    d.age+=dt; d.y+=d.vy*dt; d.vy*=Math.pow(0.1,dt*3);
    if(d.age<d.life) dmgNums[di++]=d;
  }
  dmgNums.length=di;

  // Combo 衰减
  if(comboTimer>0){
    comboTimer-=dt;
    if(comboTimer<=0){ combo=0; comboTimer=0; }
  }
}

function _drawSingleEnemy(e){
  const ch=CHARS[0];
  // ISO Y 压缩后的屏幕坐标
  const sx=Math.floor(e.x-ox()), sy=Math.floor((e.y-oy())*ISO_Y_SCALE);
  const isDead=e.state==='dead';
  const isHurt=e.hurtTimer>0;

  let fracPool, fracIdx;
  if(isDead||e.state==='hurt'){
    fracPool=ch.anim; fracIdx=0;
  } else if(e.state==='attack'){
    fracPool=ch.atk[0]&&ch.atk[0].length?ch.atk[0]:ch.anim;
    fracIdx=(1-Math.max(0,e.stateTimer)/0.45)*fracPool.length;
  } else if(e.state==='chase'){
    fracPool=ch.run&&ch.run.length?ch.run:ch.anim;
    fracIdx=e.animT*10;
  } else {
    fracPool=ch.anim;
    fracIdx=e.animT*6;
  }
  const frame=fracPool[Math.floor(fracIdx)%Math.max(1,fracPool.length)]||fracPool[0];

  ctx.save();
  if(isDead) ctx.globalAlpha=Math.max(0,1-e.deadAge/0.5);
  if(e.facing===-1){ ctx.translate(sx*2,0); ctx.scale(-1,1); }

  if(frame){
    const dh=CHAR_H, dw=Math.round(frame.width/frame.height*dh);
    if(isHurt&&Math.floor(e.hurtTimer*20)%2===0){
      drawFrameSmooth(fracPool, fracIdx, sx-dw/2, sy-dh, dw, dh);
      const fc=_getFlashCanvas(frame,dw,dh,'rgba(255,255,255,0.9)');
      ctx.globalCompositeOperation='lighter';
      ctx.drawImage(fc,sx-dw/2,sy-dh,dw,dh);
      ctx.globalCompositeOperation='source-over';
    } else {
      drawFrameSmooth(fracPool, fracIdx, sx-dw/2, sy-dh, dw, dh);
    }
  } else {
    ctx.fillStyle=isHurt?'#FFFFFF':'#44BB44';
    ctx.beginPath(); ctx.arc(sx,sy-16,12,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // 血条
  if(!isDead&&e.hp<e.maxHp){
    const bw=28,bh=3,bx=sx-bw/2,by=sy-CHAR_H-6;
    ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(bx-1,by-1,bw+2,bh+2);

// ── 头顶血条（地狱绘卷风，花纹边框）──
function _drawHeadBars(){
  function drawBar(cx, cy, w, h, ratio, fillColor, accentColor){
    const bx = cx - w/2, by = cy;
    ctx.save();
    ctx.globalAlpha = 0.72;

    // 1. 背景：烧焦暗色
    ctx.fillStyle = '#060508';
    ctx.fillRect(bx, by, w, h);

    // 2. 血量纯色
    if(ratio > 0){
      const fw = Math.max(2, w * ratio);
      ctx.fillStyle = fillColor;
      ctx.fillRect(bx, by, fw, h);
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(bx, by, fw, 1);
      ctx.fillStyle = accentColor;
      ctx.fillRect(bx, by + h - 1, fw, 1);
    }

    // 3. 花纹边框（尖刺 + 断线）
    ctx.strokeStyle = accentColor;
    ctx.lineWidth   = 1;
    ctx.globalAlpha = 0.55;

    // 左边框：V 形刺朝左
    ctx.beginPath();
    ctx.moveTo(bx, by); ctx.lineTo(bx-4, by+h/2); ctx.lineTo(bx, by+h);
    ctx.moveTo(bx-1, by+h*0.3); ctx.lineTo(bx-6, by+h*0.5); ctx.lineTo(bx-1, by+h*0.7);
    ctx.stroke();
    // 右边框：V 形刺朝右
    ctx.beginPath();
    ctx.moveTo(bx+w, by); ctx.lineTo(bx+w+4, by+h/2); ctx.lineTo(bx+w, by+h);
    ctx.moveTo(bx+w+1, by+h*0.3); ctx.lineTo(bx+w+6, by+h*0.5); ctx.lineTo(bx+w+1, by+h*0.7);
    ctx.stroke();

    // 上边框：三段断线
    ctx.beginPath();
    ctx.moveTo(bx, by); ctx.lineTo(bx+3, by);
    ctx.moveTo(bx+6, by); ctx.lineTo(bx+w-6, by);
    ctx.moveTo(bx+w-3, by); ctx.lineTo(bx+w, by);
    ctx.stroke();
    // 下边框
    ctx.beginPath();
    ctx.moveTo(bx, by+h); ctx.lineTo(bx+3, by+h);
    ctx.moveTo(bx+6, by+h); ctx.lineTo(bx+w-6, by+h);
    ctx.moveTo(bx+w-3, by+h); ctx.lineTo(bx+w, by+h);
    ctx.stroke();

    // 中间菱形标记
    if(ratio > 0.45){
      const dx = bx + Math.min(w * ratio, w * 0.52);
      const dy2 = by + h/2;
      ctx.fillStyle = accentColor;
      ctx.beginPath();
      ctx.moveTo(dx, dy2-3); ctx.lineTo(dx+2, dy2); ctx.lineTo(dx, dy2+3); ctx.lineTo(dx-2, dy2);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();
  }

  // 玩家：幽蓝鬼焰
  {
    const sx = player.x - ox();
    const sy = (player.y - oy()) * ISO_Y_SCALE - 50;
    const hr = Math.max(0, playerHp / playerMaxHp);
    const fill   = hr > 0.4 ? '#1e3a5e' : '#3a1020';
    const accent = hr > 0.4 ? '#4a8ac0' : '#c05070';
    drawBar(sx, sy, 50, 5, hr, fill, accent);
  }

  // Boss / Lucia：暗血赤色
  if(boss && boss.state !== 'dead'){
    const bossObj = (boss.isLucia && typeof lucia !== 'undefined') ? lucia : boss;
    const bsx = bossObj.x - ox();
    const bsy = (bossObj.y - oy()) * ISO_Y_SCALE - 86;
    const hr2 = Math.max(0, bossObj.hp / bossObj.maxHp);
    const fill2   = hr2 > 0.4 ? '#5a1208' : '#380820';
    const accent2 = hr2 > 0.4 ? '#c04020' : '#a02060';
    drawBar(bsx, bsy, 68, 5, hr2, fill2, accent2);
    // 名字
    ctx.save();
    ctx.globalAlpha = 0.32;
    ctx.fillStyle = accent2;
    ctx.font = '7px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(boss.isLucia ? '· LUCILLA ·' : '· KNIGHT ·', bsx, bsy - 4);
    ctx.restore();
  }
}

const BOSS_H=88, BOSS_R=10, BOSS_HIT_R=32;
const BOSS_YOF=Math.round(BOSS_H*0.28); // 骑士在帧内的Y偏移补偿（约35px）
let boss=null;
const bossProjectiles=[];

// ── 骑士帧存储 ──
const knightFrames={walk:[],atk1:[],atk2:[],atk3:[],idle:[],hurt:[],dead:[]};

// 背景去除：均值采样8个边缘点，容差BFS + 2轮侵蚀
function _bfsBgRemoveBlack(d,w,h){
  const pts=[[0,0],[w-1,0],[0,h-1],[w-1,h-1],
             [w>>1,0],[0,h>>1],[w-1,h>>1],[w>>1,h-1]];
  let sr=0,sg=0,sb=0;
  for(const [px,py] of pts){
    const pi=(py*w+px)*4;
    sr+=d[pi];sg+=d[pi+1];sb+=d[pi+2];
  }
  const bgR=Math.round(sr/pts.length);
  const bgG=Math.round(sg/pts.length);
  const bgB=Math.round(sb/pts.length);
  const TOL=38;
  const isBg=(i)=>Math.abs(d[i]-bgR)<TOL&&Math.abs(d[i+1]-bgG)<TOL&&Math.abs(d[i+2]-bgB)<TOL;

  const vis=new Uint8Array(w*h);
  const q=[];
  const enq=(x,y)=>{
    if(x<0||y<0||x>=w||y>=h)return;
    const idx=y*w+x; if(vis[idx])return; vis[idx]=1;
    if(isBg(idx*4))q.push(x,y);
  };
  for(let x=0;x<w;x++){enq(x,0);enq(x,h-1);}
  for(let y=0;y<h;y++){enq(0,y);enq(w-1,y);}
  let qi=0;
  while(qi<q.length){
    const x=q[qi++],y=q[qi++];
    d[(y*w+x)*4+3]=0;
    enq(x-1,y);enq(x+1,y);enq(x,y-1);enq(x,y+1);
  }
  // 2轮侵蚀去边缘
  for(let pass=0;pass<2;pass++){
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){
      const i=(y*w+x)*4;
      if(d[i+3]===0)continue;
      const hasTrans=(x>0&&d[(y*w+x-1)*4+3]===0)||(x<w-1&&d[(y*w+x+1)*4+3]===0)||
                     (y>0&&d[((y-1)*w+x)*4+3]===0)||(y<h-1&&d[((y+1)*w+x)*4+3]===0);
      if(!hasTrans)continue;
      if(Math.abs(d[i]-bgR)<TOL+20&&Math.abs(d[i+1]-bgG)<TOL+20&&Math.abs(d[i+2]-bgB)<TOL+20)
        d[i+3]=0;
    }
  }
}

function _gifToFrames(srcArr){
  // srcArr: base64 data URL 数组 → Canvas 数组（去黑底）
  // 注意：Image 加载是异步的，此函数只是同步创建占位，实际用 _loadKnightFrames 的异步版本
  const result=[];
  if(!srcArr||!srcArr.length)return result;
  for(const src of srcArr){
    const img=new Image();
    img.src=src;
    const fc=document.createElement('canvas');
    fc.width=img.naturalWidth||1; fc.height=img.naturalHeight||1;
    const fx=fc.getContext('2d');
    fx.drawImage(img,0,0);
    const id=fx.getImageData(0,0,fc.width,fc.height);
    _bfsBgRemoveBlack(id.data,fc.width,fc.height);
    fx.putImageData(id,0,0);
    result.push(fc);
  }
  return result;
}

function _loadKnightFrames(){
  if(typeof KNIGHT_FRAMES==='undefined'){spawnBoss();return;}

  // 只加载 walk/atk1/atk2/atk3，跳过 all.gif（减少卡顿）
  const names=['walk','atk1','atk2','atk3'];
  const allData={};
  let remaining=names.length;

  function processGroup(name,srcArr,cb){
    if(!srcArr||!srcArr.length){cb([]);return;}
    const frames=new Array(srcArr.length).fill(null);
    let loaded=0;
    for(let i=0;i<srcArr.length;i++){
      const img=new Image();
      const idx=i;
      img.onload=()=>{
        // PNG 已带透明通道（extract2.ps1 MakeTransparent），直接用
        const fc=document.createElement('canvas');
        fc.width=img.naturalWidth; fc.height=img.naturalHeight;
        const fx=fc.getContext('2d');
        fx.drawImage(img,0,0);
        frames[idx]=fc;
        if(++loaded===srcArr.length) cb(frames);
      };
      img.onerror=()=>{if(++loaded===srcArr.length) cb(frames);};
      img.src=srcArr[i];
    }
  }

  function finalize(){
    knightFrames.walk =allData.walk ||[];
    knightFrames.atk1 =allData.atk1 ||[];
    knightFrames.atk2 =allData.atk2 ||[];
    knightFrames.atk3 =allData.atk3 ||[];
    const allClean=(allData.all||[]).filter(Boolean);
    const total=allClean.length;
    // idle 用 walk 前2帧，不用 all.gif
    knightFrames.idle=knightFrames.walk.slice(0,2);
    if(!knightFrames.idle.length) knightFrames.idle=knightFrames.atk1.slice(0,1);
    // hurt/dead 用 walk 后几帧作为替代
    knightFrames.hurt=knightFrames.walk.slice(-3);
    knightFrames.dead=knightFrames.walk.slice(-4);
    if(!knightFrames.hurt.length) knightFrames.hurt=knightFrames.walk.slice(0,2);
    if(!knightFrames.dead.length) knightFrames.dead=knightFrames.walk.slice(0,2);
    const s=Object.entries(knightFrames).map(([k,v])=>`${k}:${v.length}`).join(' ');
    console.log('Knight frames ready:',s);
    spawnBoss();
  }

  for(const name of names){
    processGroup(name, KNIGHT_FRAMES[name]||[], (frames)=>{
      allData[name]=frames;
      if(--remaining===0) finalize();
    });
  }
}

  camShake(0.6,18);

  const c=phase===3?'#FF4400':'#FFD700';
  addParticle(boss.x,boss.y-BOSS_H*0.5,{n:80,c,spd:180,r:4,life:1.2,spread:Math.PI*2});
  addParticle(boss.x,boss.y-BOSS_H*0.5,{n:40,c:'#FFFFFF',spd:120,r:3,life:0.8,spread:Math.PI*2});
  shockwaves.push({x:boss.x,y:boss.y-BOSS_H*0.5,r:10,maxR:280,life:1.0,age:0,c});
  shockwaves.push({x:boss.x,y:boss.y-BOSS_H*0.5,r:5,maxR:180,life:0.7,age:0,c:'#FFFFFF'});
}
// 玩家受伤统一入口（含红闪+hit-stop）
function hurtPlayer(dmg,kx,ky,iTimer,sTimer){
  // 游戏结束时不再受伤
  if(window.GAME_STATE && window.GAME_STATE !== 'playing') return;
  // 应用难度伤害倍率
  if(window.GAME_DIFFICULTY) dmg = Math.floor(dmg * window.GAME_DIFFICULTY.bossDmgMul);
  // 圣域无敌（最高优先级，化解所有伤害）
  if(player.sanctuaryT > 0){
    // 触发反馈：白光闪 + 粒子
    addParticle(player.x, player.y-16, {
      n:8, c:'#FFFFFF', spd:140, r:2, life:0.3, spread:Math.PI*2});
    return;
  }
  // 圣域反弹（飞剑使 V 技能）：守护期反弹一次伤害
  if(currentChar === 3 && window.role3 && window.role3.sanctuaryT > 0){
    if(window.role3.trySanctuaryReflect(dmg, kx, ky)){
      playerHurtTimer = 0.4;
      return;
    }
  }
  // 防御格挡优先级最高：即使在无敌帧中也可触发格挡反馈
  if(defendBlock(kx,ky)){playerHurtTimer=0.3;return;}
  if(playerHurtTimer>0)return;
  if(shieldBlock()){playerHurtTimer=0.2;return;}
  playerHp=Math.max(0,playerHp-dmg);
  playerHurtTimer=iTimer||0.5;
  window._screenRedT = 0.20;   // 屏幕红闪 0.2s
  const ch=CF();
  if(ch.hit&&ch.hit.length>0){
    player.state='hit'; player.stateTimer=sTimer||0.35;
  } else {
    player.state='hurt'; player.stateTimer=sTimer||0.3;
  }
  const kl=Math.hypot(kx,ky)||1;
  player.vx=kx/kl*(iTimer===0.4?190:160); player.vy=ky/kl*(iTimer===0.4?190:160);
  camShake(0.2,5);
  triggerScreenFlash();
  if(playerHp<=0){ playerHp=0; camShake(0.5,15); }
}

function updatePhaseTransit(dt){
  if(!_phaseTransit.active)return;
  _phaseTransit.timer+=dt;
  if(_phaseTransit.timer>=_phaseTransit.dur) _phaseTransit.active=false;
}
// ── 大招：角色底色反转光晕 ────────────────────
function drawUltAura(){
  if(!ult.active) return;
  const sx=Math.floor(player.x-ox());
  const sy=Math.floor((player.y-oy())*ISO_Y_SCALE);
  // 光圈中心：角色头部附近（脚底 sy 上移约身高全程）
  const cY = sy - 44;
  const t=ult.timer/ULT_DUR;
  const pulse=0.82+Math.sin(ult.burstAge*7)*0.18;

  ctx.save();

  // ── 外层金色光晕（椭圆，宽扁，适配 ISO 视角）
  const r=38*pulse;
  const ry=r*0.55; // Y 轴压缩（ISO 感）
  ctx.save();
  ctx.translate(sx, cY);
  const g=ctx.createRadialGradient(0,0,0,0,0,r);
  g.addColorStop(0,  `rgba(255,210,30,${0.32*t*pulse})`);
  g.addColorStop(0.6,`rgba(255,140,0,${0.14*t*pulse})`);
  g.addColorStop(1,  'rgba(255,100,0,0)');
  ctx.fillStyle=g;
  ctx.scale(1, ry/r);
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // ── 剩余时间弧（角色脚底小弧条）
  const arcR=18;
  ctx.strokeStyle=`rgba(255,200,0,${0.7*t})`;
  ctx.lineWidth=2.5;
  ctx.lineCap='round';
  ctx.beginPath();
  ctx.arc(sx,sy-4,arcR,-Math.PI/2,-Math.PI/2+t*Math.PI*2);
  ctx.stroke();

  // ── 末尾闪烁警告（最后2s）
  if(ult.timer<2.0){
    const warn=Math.floor(ult.timer*6)%2===0;
    if(warn){
      ctx.globalAlpha=0.35*(1-ult.timer/2.0);
      ctx.strokeStyle='#FF4400';
      ctx.lineWidth=2;
      ctx.beginPath();
      ctx.arc(sx,sy-4,arcR+4,0,Math.PI*2);
      ctx.stroke();
    }
  }

  ctx.restore();
}

function drawPhaseTransit(){
  if(!_phaseTransit.active||!boss)return;
  const t=_phaseTransit.timer/_phaseTransit.dur;
  const alpha=t<0.3?(t/0.3):t>0.7?((1-t)/0.3):1.0;
  const phase=_phaseTransit.phase;
  const bsy=Math.floor((boss.y-oy())*ISO_Y_SCALE)-BOSS_H*0.5+BOSS_YOF;
  ctx.save();
  if(t<0.15){
    const fa=(1-t/0.15);
    ctx.globalAlpha=fa*(phase===3?0.45:0.3);
    ctx.fillStyle=phase===3?'#FF2200':'#FFD700';
    ctx.fillRect(0,0,CW,CH);
  }
  ctx.globalAlpha=Math.min(1,alpha*1.5)*0.92;
  ctx.font=`bold ${28+Math.floor(t*6)}px monospace`;
  ctx.textAlign='center';
  const labels={2:'PHASE Ⅱ  狂化',3:'PHASE Ⅲ  极限暴走'};
  const colors={2:'#FFD700',3:'#FF4400'};
  ctx.fillStyle=colors[phase]||'#FFF';
  ctx.shadowColor=colors[phase]||'#FFF'; ctx.shadowBlur=18;
  ctx.fillText(labels[phase]||`PHASE ${phase}`,CW/2,bsy-40+Math.sin(t*8)*3);
  ctx.shadowBlur=0; ctx.textAlign='left';
  ctx.restore();
}

function hitBoss(dmg,kx,ky){
  if(!boss||boss.state==='dead'||boss.hurtTimer>0)return;
  // 游戏未在进行中：忽略伤害
  if(window.GAME_STATE && window.GAME_STATE !== 'playing') return;
  // BOSS AI 关闭时，BOSS 视为练习模式无敌
  if(window.BOSS_AI === false){
    if(dmgNums.length<DMGNUM_MAX)
      dmgNums.push({x:boss.x,y:boss.y-90,val:0,age:0,life:0.9,vy:-55});
    boss.hurtTimer = 0.12;
    return;
  }
  // 应用玩家难度伤害倍率
  if(window.GAME_DIFFICULTY) dmg = Math.floor(dmg * window.GAME_DIFFICULTY.playerDmgMul);
  if(dmg < 1) dmg = 1;
  // 调试：boss 无敌（仅显示伤害数字，不真实扣血）
  if(window.BOSS_INVINCIBLE){
    if(dmgNums.length<DMGNUM_MAX)
      dmgNums.push({x:boss.x,y:boss.y-90,val:dmg,age:0,life:0.9,vy:-55});
    if(typeof combo !== 'undefined'){
      combo++; comboTimer=COMBO_RESET; comboPeak=Math.max(comboPeak,combo);
    }
    boss.hurtTimer = 0.12;
    // 锁血：每帧把 hp 拉回 maxHp，防止任何其他路径扣血
    boss.hp = boss.maxHp;
    return;
  }
  // Lucia 自有受击逻辑
  if(boss.isLucia){
    if(typeof luciaTakeDamage==='function') luciaTakeDamage(dmg, kx, ky);
    if(dmgNums.length<DMGNUM_MAX)
      dmgNums.push({x:boss.x,y:boss.y-90,val:dmg,age:0,life:0.9,vy:-55});
    combo++; comboTimer=COMBO_RESET; comboPeak=Math.max(comboPeak,combo);
    return;
  }
  // Ember 自有受击逻辑
  if(boss.isEmber){
    if(typeof emberTakeDamage==='function') emberTakeDamage(dmg, kx, ky);
    if(dmgNums.length<DMGNUM_MAX)
      dmgNums.push({x:boss.x,y:boss.y-90,val:dmg,age:0,life:0.9,vy:-55});
    combo++; comboTimer=COMBO_RESET; comboPeak=Math.max(comboPeak,combo);
    return;
  }
  boss.hp-=dmg;
  boss.hurtTimer=0.22;   // 0.18 → 0.22 受击帧稍长，命中感更清晰
  combo++; comboTimer=COMBO_RESET; comboPeak=Math.max(comboPeak,combo);
  if(dmgNums.length<DMGNUM_MAX)
    dmgNums.push({x:boss.x,y:boss.y-BOSS_H-5,val:dmg,age:0,life:0.9,vy:-55});
  const kl=Math.hypot(kx,ky)||1;
  boss.vx=kx/kl*50;boss.vy=ky/kl*50;
  // Hit-stop：普通命中0.04s，高伤害0.07s
  triggerHitStop(dmg>=25?0.07:0.04);
  if(boss.hp<=0){
    boss.hp=0;
    boss.state='dead';boss.deadAge=0;
    camShake(0.7,16);
    triggerHitStop(0.12);
    addParticle(boss.x,boss.y-BOSS_H/2,{n:50,c:'#FFD700',spd:130,r:3,life:0.9,spread:Math.PI*2});
    addParticle(boss.x,boss.y-BOSS_H/2,{n:25,c:'#FFFFFF',spd:90,r:2,life:0.5,spread:Math.PI*2});
    shockwaves.push({x:boss.x,y:boss.y-BOSS_H/2,r:12,maxR:240,life:0.8,age:0,c:'#FFD700'});
  }else{
    boss.state='hurt';boss.stateTimer=0.2;
    // Phase 变身检测
    const newPhase=_bossPhase();
    if(newPhase>(_bossLastPhase||1)){
      _bossLastPhase=newPhase;
      _triggerPhaseTransition(newPhase);
    }
  }
}

function _chooseBossAttack(phase,pdist,speedMul){
  if(boss.atkCooldown>0) return;

  // 各技能独立 CD + phase 解锁权重池
  // [名称, CD已就绪?, 权重, 距离条件]
  const pool=[];

  // 近身普攻（atk1：距离近才用）
  if(boss.atk1CD<=0 && pdist<120) pool.push('atk1','atk1','atk1');

  // 震地AOE（atk2：中近距）
  if(boss.atk2CD<=0 && pdist<180) pool.push('atk2','atk2');

  // 直线剑气（atk3：任意距离）Phase1起
  if(boss.atk3CD<=0) pool.push('atk3','atk3');

  // 抛物线飞剑（atk4）Phase2起
  if(phase>=2 && boss.atk4CD<=0) pool.push('atk4','atk4');

  // 环绕追踪球（atk5）Phase3
  if(phase>=3 && boss.atk5CD<=0) pool.push('atk5','atk5');

  // 冲刺（Phase1起，距离适中即可，高权重）
  if(boss.chargeCD<=0 && pdist>60) pool.push('charge','charge','charge');

  if(pool.length===0) return;

  const chosen=pool[Math.floor(Math.random()*pool.length)];
  boss.state='telegraph';
  boss.telegraphType=chosen;
  // 低血量缩短预警时间
  boss.telegraphTimer=boss.hp/boss.maxHp<0.3?0.3:0.5;
  // 全局攻击间隔（随phase加速）
  boss.atkCooldown=Math.max(1.6, 2.2/speedMul);
  // 各技能独立CD
  const CDs={atk1:2.5, atk2:6.0, atk3:4.0, atk4:5.0, atk5:7.0, charge:5.0};
  if(CDs[chosen]) boss[chosen+'CD']=CDs[chosen];
}

function _execBossAttack(type){
  const pdx=player.x-boss.x,pdy=player.y-boss.y;
  const pdist=Math.hypot(pdx,pdy);

  if(type==='atk1'){
    boss.state='atk1';boss.atkPhaseT=0;boss.stateTimer=1.5;  // 原0.5，减慢至1/3
    camShake(0.1,3);

  }else if(type==='atk2'){
    // 震地斩：先播粒子预警，0.3s后才造成伤害
    boss.state='atk2';boss.atkPhaseT=0;boss.stateTimer=0.65;
    camShake(0.15,5);
    // 预警粒子（提示玩家准备格挡）
    addParticle(boss.x,boss.y-30,{n:20,c:'#FFD700',spd:80,r:2,life:0.5,spread:Math.PI*2});
    addParticle(boss.x,boss.y-30,{n:10,c:'#FFFFFF',spd:50,r:1.5,life:0.3,spread:Math.PI*2});
    // 0.28s后真正爆发（给玩家窗口格挡）
    boss._pendingHurt = boss._pendingHurt || [];
    boss._pendingHurt.push({
      delay: 0.28,
      fn: ()=>{
        const pdx2=player.x-boss.x, pdy2=player.y-boss.y;
        const pd2=Math.hypot(pdx2,pdy2);
        camShake(0.3,10);
        addParticle(boss.x,boss.y-30,{n:30,c:'#FFD700',spd:140,r:3,life:0.6,spread:Math.PI*2});
        addParticle(boss.x,boss.y-30,{n:15,c:'#FFF5AA',spd:80,r:2,life:0.4,spread:Math.PI*2});
        shockwaves.push({x:boss.x,y:boss.y-30,r:10,maxR:160,life:0.5,age:0,c:'#FFD700'});
        shockwaves.push({x:boss.x,y:boss.y-30,r:5,maxR:100,life:0.35,age:0,c:'#FFFFFF'});

    boss.state='atk3';boss.atkPhaseT=0;boss.stateTimer=0.8;
    const angle=Math.atan2(pdy,pdx);
    // 3颗同类型剑气，角度微收拢（中→左→右），间隔0.12s

        type:'beam_fast', angle:a, trail:[],
        glow:'#88CCFF', core:'#DDEEFF',
      };
      if(delays[i]===0) bossProjectiles.push(proj);
      else boss._pending.push({delay:delays[i], proj});
    }
    addParticle(boss.x,boss.y-36,{n:22,c:'#88CCFF',spd:110,r:2,life:0.3,spread:Math.PI*0.35,angle});
    addParticle(boss.x,boss.y-36,{n:8, c:'#FFFFFF',spd:55, r:1.5,life:0.2,spread:Math.PI*0.2,angle});
    camShake(0.1,3);

  }else if(type==='atk4'){
    // ── 抛物线飞剑：3连发错开时间 ──
    boss.state='atk3';boss.atkPhaseT=0;boss.stateTimer=0.9; // 复用atk3动画
    const angle=Math.atan2(pdy,pdx);
    for(let i=0;i<3;i++){
      const a=angle+(i-1)*0.14;
      boss._pending.push({delay:i*0.18,proj:{
        x:boss.x,y:boss.y-36,
        vx:Math.cos(a)*260,vy:Math.sin(a)*260-90,
        grav:300,
        r:9,life:1.8,age:0,dmg:15,
        type:'arc_blade',angle:a,trail:[],
        glow:'#FF6600',core:'#FFCC44',
      }});
    }
    addParticle(boss.x,boss.y-36,{n:22,c:'#FF8800',spd:100,r:2.5,life:0.35,spread:Math.PI*0.5,angle});
    addParticle(boss.x,boss.y-36,{n:8,c:'#FFFFFF',spd:55,r:1.5,life:0.2,spread:Math.PI*0.3,angle});
    camShake(0.12,4);

  }else if(type==='atk5'){
    // ── 环绕追踪球：3颗先绕boss后甩出 ──
    boss.state='atk3';boss.atkPhaseT=0;boss.stateTimer=1.1;
    const angle=Math.atan2(pdy,pdx);
    const phase=_bossPhase();
    const cnt=phase===3?4:3;
    for(let i=0;i<cnt;i++){
      bossProjectiles.push({
        x:boss.x,y:boss.y-36,
        vx:0,vy:0,
        r:11,life:3.2,age:0,dmg:18,
        type:'orbit_ball',angle:Math.PI*2/cnt*i,
        orbitR:42,orbitSpd:5.0,orbitAge:0,orbitDur:0.7,

      });

    addParticle(boss.x,boss.y-36,{n:28,c:'#CC44FF',spd:75,r:2.5,life:0.5,spread:Math.PI*2});
    addParticle(boss.x,boss.y-36,{n:10,c:'#FFFFFF',spd:40,r:1.5,life:0.3,spread:Math.PI*2});
    shockwaves.push({x:boss.x,y:boss.y-36,r:4,maxR:55,life:0.3,age:0,c:'#CC44FF'});

    addParticle(boss.x,boss.y-40,{n:30,c:'#FF8800',spd:150,r:2.5,life:0.3,spread:Math.PI*2,angle:ca+Math.PI});
