<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}
html, body{
  width:100%; height:100%; overflow:hidden;
  position: fixed; left:0; top:0;
  -webkit-text-size-adjust: 100%;
  -webkit-overflow-scrolling: auto;
  overscroll-behavior: none;
  touch-action: none;
}
body{background:#060A14;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'PingFang SC','Microsoft YaHei',monospace;-webkit-tap-highlight-color:transparent;overflow:hidden;}
#c-wrap{
  position:relative;
  flex-shrink:0;
}
#c-wrap::before{
  content:'';position:absolute;inset:-30px;
  background:radial-gradient(ellipse at center, rgba(255,80,40,0.08) 0%, rgba(0,0,0,0) 70%);
  pointer-events:none;
}
canvas{
  display:block;
  image-rendering: auto;
  box-shadow: 0 0 60px 8px rgba(180,40,10,0.20),
              0 0 140px 30px rgba(120,20,5,0.12);
}
#dbg{display:none}



#mobile-ui { display: none; }
body.mobile #mobile-ui { display: block; }

body.mobile{ background:#000; overflow:hidden; }
body.mobile #c-wrap{
  /* 继承通用 #c-wrap 的 fixed+inset:0+flex 布局，不覆盖 */
  z-index: 1;
}
body.mobile #c-wrap canvas{
  -webkit-mask-image: none !important;
          mask-image: none !important;
  box-shadow: none !important;
  border-radius: 0;
  pointer-events: auto;
  image-rendering: auto;
  display: block;
}
body.mobile #c-wrap::before{ display:none; }

#rotate-hint{
  display: none;
  position: fixed; inset: 0;
  background: #000;
  z-index: 9999;
  align-items: center; justify-content: center;
  flex-direction: column;
  color: #FFE7B0;
  font: 600 16px/1.6 'PingFang SC',sans-serif;
  text-align: center;
  padding: 20px;
  cursor: pointer;
}
#rotate-hint .ico{
  width: 110px; height: 64px;
  border: 3px solid #FFB050;
  border-radius: 12px;
  margin-bottom: 24px;
  position: relative;
  animation: rot-anim 1.6s ease-in-out infinite;
}
#rotate-hint .ico::after{
  content:''; position:absolute; left:8px; top:50%;
  width: 8px; height: 8px; border-radius:50%;
  background: #FFB050; transform: translateY(-50%);
}
#rotate-hint .tip{
  margin-top: 18px;
  font-size: 13px;
  opacity: 0.6;
  border: 1px solid rgba(255,180,80,0.4);
  padding: 8px 18px;
  border-radius: 6px;
}
@keyframes rot-anim{
  0%, 100%{ transform: rotate(0deg); }
  40%, 60%{ transform: rotate(-90deg); }
}
body.mobile #rotate-hint{ display: none; }
body.mobile.show-hint:not(.hint-dismissed) #rotate-hint{ display: flex; }

#btn-ai, #btn-boss-ai{
  position:fixed; top:calc(env(safe-area-inset-top, 0) + 12px);
  width:60px; height:32px;
  display:flex; align-items:center; justify-content:center;
  font:600 11px/1 'PingFang SC',sans-serif;
  letter-spacing:2px;
  color: rgba(255,220,170,0.85);
  background: linear-gradient(180deg, rgba(20,12,8,0.45) 0%, rgba(0,0,0,0.55) 100%);
  border: 1px solid rgba(255,180,80,0.45);
  border-radius: 4px;
  z-index: 60;
  -webkit-tap-highlight-color: transparent;
  cursor: pointer;
  transition: transform 0.08s, box-shadow 0.2s, background 0.2s, border-color 0.2s;
  user-select: none;
  box-shadow:
    inset 0 1px 0 rgba(255,200,140,0.18),
    inset 0 -1px 0 rgba(0,0,0,0.6),
    0 1px 4px rgba(0,0,0,0.6);
}
#btn-ai{ left: calc(env(safe-area-inset-left, 0) + 12px); }
#btn-boss-ai{ right: calc(env(safe-area-inset-right, 0) + 12px); }
#btn-ai .dot, #btn-boss-ai .dot{
  width:5px; height:5px; border-radius:50%;
  background:#444; margin-right:6px;
  box-shadow: inset 0 0 2px rgba(0,0,0,0.8);
}
#btn-ai.on{
  color: #FFF6D8;
  background: linear-gradient(180deg, rgba(140,60,30,0.7) 0%, rgba(80,30,15,0.7) 100%);
  border-color: #FFC470;
  box-shadow:
    inset 0 1px 0 rgba(255,220,160,0.5),
    inset 0 -1px 0 rgba(40,10,5,0.7),
    0 0 14px rgba(255,160,60,0.55),
    0 1px 4px rgba(0,0,0,0.6);
}
#btn-ai.on .dot{ background:#FFE066; box-shadow:0 0 5px #FF9020, inset 0 0 2px rgba(255,255,255,0.8); }
#btn-boss-ai.on{
  color: #FFE0E0;
  background: linear-gradient(180deg, rgba(160,40,40,0.7) 0%, rgba(80,15,15,0.7) 100%);
  border-color: #FF8080;
  box-shadow:
    inset 0 1px 0 rgba(255,180,180,0.5),
    inset 0 -1px 0 rgba(40,5,5,0.7),
    0 0 14px rgba(255,80,80,0.55),
    0 1px 4px rgba(0,0,0,0.6);
}
#btn-boss-ai.on .dot{ background:#FF6060; box-shadow:0 0 5px #FF2020, inset 0 0 2px rgba(255,255,255,0.8); }

#joystick-area{
  position: fixed;
  left: 0; bottom: 0;
  width: 38vw; height: 38vw;
  max-width: 220px; max-height: 220px;
  z-index: 55;
  touch-action: none;
}
#joystick-base{
  position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
  width:108px; height:108px; border-radius:50%;
  background: radial-gradient(circle at center, rgba(0,0,0,0.20) 0%, rgba(0,0,0,0.05) 70%, transparent 100%);
  border: 1.5px solid rgba(255,200,140,0.30);
  box-shadow:
    inset 0 0 18px rgba(0,0,0,0.40),
    inset 0 0 1px rgba(255,200,140,0.4),
    0 0 14px rgba(0,0,0,0.5);
  opacity: 0.85;
  transition: opacity 0.2s, border-color 0.2s, box-shadow 0.2s;
}
#joystick-base::before{
  content:''; position:absolute; inset:14px;
  border-radius:50%;
  border: 1px dashed rgba(255,200,140,0.18);
  pointer-events:none;
}
#joystick-area.active #joystick-base{
  opacity: 1;
  border-color: rgba(255,220,160,0.65);
  box-shadow:
    inset 0 0 22px rgba(0,0,0,0.45),
    inset 0 0 1px rgba(255,220,160,0.6),
    0 0 18px rgba(255,160,60,0.25);
}
#joystick-stick{

}

.skill-btn{
  position: absolute;
  width: 42px; height: 42px;

  font: 700 12px/1 'PingFang SC',sans-serif;

  box-shadow:
    inset 0 1px 1px rgba(255,220,160,0.30),

    0 1px 3px rgba(0,0,0,0.6);
}
.skill-btn::before{
  content:''; position:absolute; inset:3px;
  border-radius:50%;
  border: 1px solid rgba(255,200,140,0.18);
  pointer-events:none;
  z-index: 1;
}
.skill-btn::after{
  content:''; position:absolute; inset:0; border-radius:50%;
  pointer-events:none;
  background: conic-gradient(from -90deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.65) var(--cd, 0%), transparent var(--cd, 0%));
  opacity: 0.95;
  z-index: 2;
}
.skill-btn .lbl{
  position:relative; z-index:3;
  font-size: 11px;
  font-weight: 800;
}
.skill-btn .key{
  position:absolute; bottom:1px; right:3px;
  font:700 7px/1 monospace; color:rgba(255,200,120,0.6); z-index:3;
  letter-spacing: 0.5px;
}
.skill-btn:active, .skill-btn.pressed{
  transform: scale(0.86);
  background:
    radial-gradient(circle at 50% 35%, rgba(255,180,80,0.45) 0%, rgba(180,80,30,0.55) 100%);
  border-color: rgba(255,240,180,1);
  box-shadow:
    inset 0 1px 1px rgba(255,255,255,0.55),
    inset 0 -1px 2px rgba(0,0,0,0.4),
    0 0 16px rgba(255,200,100,0.85),
    0 0 4px rgba(255,255,255,0.6);
}
.skill-btn.dim{ opacity: 0.5; filter: saturate(0.5) brightness(0.85); }
.skill-btn.skill-locked{
  opacity: 0.22; filter: saturate(0) brightness(0.5);
  pointer-events: none; cursor: default;
}
.skill-btn.skill-locked::after{ background: rgba(0,0,0,0.7) !important; --cd: 100% !important; }

#l5-hud{

#l5-exp-bar{

#l5-levelup{
  position:fixed; left:50%; top:38%; transform:translateX(-50%);
  font:900 28px/1 'PingFang SC',monospace;
  color:#FFE870; text-shadow:0 0 20px #FF8800,0 2px 4px #000;

}
@keyframes l5-lu-anim{
  0%  { opacity:0; transform:translateX(-50%) translateY(10px) scale(0.8); }
  18% { opacity:1; transform:translateX(-50%) translateY(0px)  scale(1.1); }
  55% { opacity:1; transform:translateX(-50%) translateY(-5px) scale(1.0); }
  100%{ opacity:0; transform:translateX(-50%) translateY(-20px) scale(0.9); }
}

<div id="loading-screen" style="

  display:flex;flex-direction:column;align-items:center;justify-content:center;

">
  <!-- 背景粒子 canvas -->
  <canvas id="loading-bg" style="position:absolute;inset:0;width:100%;height:100%;opacity:0.35;"></canvas>

  <div style="position:relative;text-align:center;user-select:none;">
    <!-- 标题 -->
    <div style="font-size:2.2em;font-weight:900;letter-spacing:0.18em;
      background:linear-gradient(135deg,#ff3366,#aa0022,#ff6688);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      text-shadow:none;margin-bottom:6px;">MOKSHA ECHO</div>

      LOADING ASSETS</div>

    <!-- 进度条外框 -->
    <div style="width:320px;height:6px;border-radius:3px;
      background:rgba(180,0,40,0.18);border:1px solid rgba(200,0,50,0.35);
      overflow:hidden;margin:0 auto 14px;">
      <div id="lp-bar" style="height:100%;width:0%;border-radius:3px;
        background:linear-gradient(90deg,#880022,#ff2255,#ff88aa);
        transition:width 0.12s ease;box-shadow:0 0 8px #ff2255;"></div>
    </div>

    <!-- 百分比 + 当前任务 -->
    <div style="display:flex;justify-content:space-between;width:320px;margin:0 auto 8px;">
      <span id="lp-pct" style="color:#ff4466;font-size:0.8em;font-weight:700;">0%</span>
      <span id="lp-task" style="color:#884455;font-size:0.75em;"></span>
    </div>

    <!-- 细节列表 -->
    <div id="lp-items" style="width:320px;margin:0 auto;text-align:left;"></div>
  </div>
</div>

<script>
// ── 全局加载进度管理器 ─────────────────────
window._LP = (function(){
  const tasks = {};   // key -> { label, loaded, total }
  let _hideTimer = null;

  function reg(key, label, total){
    tasks[key] = { label, loaded:0, total:total||1 };
    _render();
  }
  function tick(key, loaded, total){
    if(!tasks[key]) tasks[key]={ label:key, loaded:0, total:total||1 };
    tasks[key].loaded = loaded;
    if(total) tasks[key].total = total;
    _render();
  }
  function done(key){
    if(tasks[key]){ tasks[key].loaded = tasks[key].total; }
    _render();
    _tryHide();
  }

  function _totalPct(){
    let ld=0,tt=0;
    for(const k in tasks){ ld+=tasks[k].loaded; tt+=tasks[k].total; }
    return tt>0 ? ld/tt : 0;
  }

  function _render(){
    const pct = _totalPct();
    const pctStr = Math.round(pct*100)+'%';
    const bar = document.getElementById('lp-bar');
    const pctEl = document.getElementById('lp-pct');
    const taskEl = document.getElementById('lp-task');
    const items = document.getElementById('lp-items');
    if(bar) bar.style.width = pctStr;
    if(pctEl) pctEl.textContent = pctStr;
    // 找正在加载中的任务名
    let activeName = '';
    for(const k in tasks){
      const t = tasks[k];
      if(t.loaded < t.total){ activeName = t.label; break; }
    }
    if(taskEl) taskEl.textContent = activeName;
    // 细节列表
    if(items){
      let html = '';
      for(const k in tasks){
        const t = tasks[k];
        const p = t.total>0 ? Math.round(t.loaded/t.total*100) : 0;
        const done2 = t.loaded >= t.total;
        const col = done2 ? '#336633' : '#883344';
        const icon = done2 ? '✓' : '…';
        html += `<div style="display:flex;justify-content:space-between;
          color:${col};font-size:0.68em;line-height:1.7;padding:0 2px;">
          <span>${icon} ${t.label}</span>
          <span>${t.loaded}/${t.total}</span></div>`;
      }
      items.innerHTML = html;
    }
  }

  function _tryHide(){
    // 所有任务完成才隐藏
    for(const k in tasks){
      if(tasks[k].loaded < tasks[k].total) return;
    }
    if(Object.keys(tasks).length === 0) return;
    if(_hideTimer) return;
    _hideTimer = setTimeout(_forceHide, 300);
  }

  function _forceHide(){
    const scr = document.getElementById('loading-screen');
    if(scr){
      scr.style.opacity = '0';
      setTimeout(()=>{ scr.style.display='none'; }, 650);
    }
  }

  // 最长等待 8 秒强制消失（防止某个任务卡死）
  setTimeout(_forceHide, 8000);

  // 背景粒子动画
  (function initBgParticles(){
    const cv = document.getElementById('loading-bg');
    if(!cv) return;
    const resize = ()=>{ cv.width=window.innerWidth; cv.height=window.innerHeight; };
    resize(); window.addEventListener('resize', resize);
    const ctx2 = cv.getContext('2d');
    const pts = Array.from({length:55},()=>({
      x:Math.random()*cv.width, y:Math.random()*cv.height,
      vx:(Math.random()-0.5)*0.6, vy:(Math.random()-0.5)*0.4,
      r:Math.random()*2+0.8, a:Math.random()*0.7+0.2
    }));
    function frame(){
      if(!document.getElementById('loading-screen') ||
         document.getElementById('loading-screen').style.display==='none') return;
      ctx2.clearRect(0,0,cv.width,cv.height);
      for(const p of pts){
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0)p.x=cv.width; if(p.x>cv.width)p.x=0;
        if(p.y<0)p.y=cv.height; if(p.y>cv.height)p.y=0;
        ctx2.beginPath(); ctx2.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx2.fillStyle=`rgba(${100+Math.random()*80},0,${30+Math.random()*40},${p.a})`;
        ctx2.fill();
      }
      requestAnimationFrame(frame);
    }
    frame();
  })();

  return { reg, tick, done };
})();
</script>

  canvas.width  = LOGIC_W * dpr;

const _bloodPillars = [];
function _spawnBloodPillar(wx, wy, life, kind){
  _bloodPillars.push({
    x: wx, y: wy,
    age: 0, life: life,
    maxH: kind==='huge' ? 220 : (110 + Math.random()*60),
    width: kind==='huge' ? 50 : (16 + Math.random()*8),
    kind: kind || 'normal',
  });
  for(let i=0;i<10;i++){
    const a = -Math.PI*0.5 + (Math.random()-0.5)*0.6;
    addParticle(wx, wy, {n:1, c:i%2?'#FFFFFF':'#CC0000', spd:120+Math.random()*80, r:2.2, life:0.5, spread:0.05, angle:a, gravity:50});
  }
}
function _updateBloodPillars(dt){
  let pi=0;
  for(const p of _bloodPillars){
    p.age += dt;
    if(p.age < p.life) _bloodPillars[pi++] = p;
  }
  _bloodPillars.length = pi;
}
function _drawBloodPillars(){
  for(const p of _bloodPillars){
    const t = p.age / p.life;
    const grow = Math.min(1, t*2.5);          //
    const fade = t > 0.4 ? Math.pow(1 - (t-0.4)/0.6, 1.5) : 1;  //
    const sx = p.x - ox();
    const sy = (p.y - oy()) * ISO_Y_SCALE;
    const h = p.maxH * grow;
    const w = p.width * (0.6 + grow*0.4);
    const alpha = fade;
    if(alpha <= 0.01) continue;

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const grad = ctx.createLinearGradient(0, sy - h, 0, sy + 8);
    grad.addColorStop(0,   `rgba(255,40,40,0)`);
    grad.addColorStop(0.3, `rgba(255,40,40,${(alpha*0.4).toFixed(3)})`);
    grad.addColorStop(0.7, `rgba(180,10,10,${(alpha*0.7).toFixed(3)})`);
    grad.addColorStop(1,   `rgba(120,0,0,${(alpha*0.5).toFixed(3)})`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(sx, sy - h*0.5 + 4, w, h*0.5, 0, 0, Math.PI*2);
    ctx.fill();
    const grad2 = ctx.createLinearGradient(0, sy - h, 0, sy + 4);
    grad2.addColorStop(0,   `rgba(255,200,200,0)`);
    grad2.addColorStop(0.5, `rgba(255,255,255,${(alpha*0.7).toFixed(3)})`);
    grad2.addColorStop(1,   `rgba(255,80,80,${(alpha*0.3).toFixed(3)})`);
    ctx.fillStyle = grad2;
    ctx.beginPath();
    ctx.ellipse(sx, sy - h*0.5 + 4, w*0.35, h*0.5, 0, 0, Math.PI*2);
    ctx.fill();
    const baseG = ctx.createRadialGradient(sx, sy + 4, 0, sx, sy + 4, w*1.6);
    baseG.addColorStop(0, `rgba(255,30,30,${(alpha*0.5).toFixed(3)})`);
    baseG.addColorStop(1, 'rgba(120,0,0,0)');
    ctx.fillStyle = baseG;
    ctx.beginPath();
    ctx.ellipse(sx, sy + 4, w*1.6, w*0.6, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function buildMap(){
  for(let y=0;y<MAP_H;y++){
    map[y]=[]; mapProps[y]=[]; tileType[y]=[];
    for(let x=0;x<MAP_W;x++){ map[y][x]=0; mapProps[y][x]=0; tileType[y][x]='.'; }
  }
}

function initMapImage(onReady){

  if(ACTIVE_LEVEL){
    MAP_W = ACTIVE_LEVEL.mapW || 72;
    MAP_H = ACTIVE_LEVEL.mapH || 48;

    window._activeLightPreset  = ACTIVE_LEVEL.lightPreset || 'hell';

  }

  // 初始化 mapProps / tileType（map 已在上面构建好，不覆盖）
  for(let y=0;y<MAP_H;y++){
    mapProps[y]=[]; tileType[y]=[];
    for(let x=0;x<MAP_W;x++){ mapProps[y][x]=0; tileType[y][x]='.'; }
  }

  // mapCanvas 尺寸用游戏逻辑坐标（MAP_W*TILE × MAP_H*TILE），
  // 但乘 HQ_SCALE 提升物理分辨率，使贴图更清晰
  const HQ_SCALE = 4;   // 1=普通 2=高清 3=超清 4=极清（内存=4MB×倍数）
  const _mapDPR = HQ_SCALE;
  mapCanvas = document.createElement('canvas');
  mapCanvas.width  = MAP_W * TILE * _mapDPR;
  mapCanvas.height = MAP_H * TILE * _mapDPR;
  mapCanvas._mapDPR = _mapDPR;
  const mc = mapCanvas.getContext('2d');
  mc.scale(_mapDPR, _mapDPR);
  mc.imageSmoothingEnabled = true;
  mc.imageSmoothingQuality = 'high';

  loadAtlas(() => {
    finishMap(mc, onReady);
  });
}

function finishMap(mc, onReady) {
  drawBaseGround(mc, MAP_W, MAP_H);

  const _al = window.LEVEL_4 || window.LEVEL_3 || null;
  if(_al && _al.mapData){
    const md = _al.mapData;
    const mw = _al.mapW || MAP_W, mh = _al.mapH || MAP_H;
    for(let ty=0;ty<MAP_H;ty++) for(let tx=0;tx<MAP_W;tx++) map[ty][tx]=1;
    for(let ty=0;ty<mh&&ty<MAP_H;ty++)
      for(let tx=0;tx<mw&&tx<MAP_W;tx++)
        map[ty][tx] = md[ty][tx];
    console.log('[map] mapData applied:', _al.name, '| tile(20,20)=', map[20]?.[20], 'tile(15,15)=', map[15]?.[15]);
  } else {
    applyGroundCollision(map, MAP_W, MAP_H);
  }

  {
    const md2 = window._pendingMapData;
    const lv2 = window._pendingMapLevel;
    if(md2 && lv2 && !_al){
      const mw = lv2.mapW || MAP_W, mh = lv2.mapH || MAP_H;
      for(let ty=0;ty<mh&&ty<MAP_H;ty++)
        for(let tx=0;tx<mw&&tx<MAP_W;tx++)
          map[ty][tx] = md2[ty][tx];
    }
    window._pendingMapData = null;
    window._pendingMapLevel = null;
  }

  const findWalkable = (tx0, ty0) => {
    if(map[ty0]&&map[ty0][tx0]===0) return [tx0, ty0];
    for(let r=1; r<20; r++) for(let dy=-r; dy<=r; dy++) for(let dx=-r; dx<=r; dx++) {
      const tx=tx0+dx, ty=ty0+dy;
      if(map[ty]&&map[ty][tx]===0) return [tx, ty];
    }
    return [tx0, ty0];
  };

  if(window.LUCIA_START_PHASE){
    let walkLog = [];
    for(let ty=20;ty<=30;ty++) for(let tx=44;tx<=64;tx++){
      if(map[ty]&&map[ty][tx]===0) walkLog.push(`(${tx},${ty})`);
    }
    console.log('[map] walkable arena tiles:', walkLog.join(' '));
  }

  const [pTx2, pTy2] = findWalkable(Math.floor(player.x/TILE), Math.floor(player.y/TILE));
  player.x = pTx2*TILE + TILE/2;
  player.y = pTy2*TILE + TILE/2;
  console.log('[spawn] player at tile', Math.floor(player.x/TILE), Math.floor(player.y/TILE));

  levelProps = [];   //

  applyPropsToMap(mapProps, levelProps);
  for(let y=0;y<MAP_H;y++) for(let x=0;x<MAP_W;x++)
    tileType[y][x] = (map[y][x]===1 || mapProps[y][x]===1) ? '#' : '.';

  drawPropsToCanvas(mc, levelProps);

  postprocessMapCanvas(mc);

  mapReady = true;
  if(onReady) onReady();
}

                      lp==='sky'   ? 'rgba(100,160,220,0.3)' :
                      lp==='void'  ? 'rgba(120,60,200,0.3)'  :

    for(let ty=0;ty<MAP_H;ty++) for(let tx=0;tx<MAP_W;tx++){

        mc.fillStyle = tileColor;

        mc.strokeStyle = lineColor;
        mc.lineWidth = 0.5;
        mc.strokeRect(tx*T+0.5, ty*T+0.5, T-1, T-1);
      }
    }
  }

  const vigAlpha = window._activeGroundUrl ? 0.15 : 0.35;

}
function solid(wx,wy){
  const tx=Math.floor(wx/TILE), ty=Math.floor(wy/TILE);
  if(!isFinite(tx)||!isFinite(ty)) return true; // NaN/Infinity 坐标视为实心
  if(tx<0||ty<0||tx>=MAP_W||ty>=MAP_H)return true;
  return map[ty][tx]===1 || mapProps[ty][tx]===1;
}
function solidTerrain(wx,wy){
  const tx=Math.floor(wx/TILE), ty=Math.floor(wy/TILE);
  if(!isFinite(tx)||!isFinite(ty)) return true; // NaN/Infinity 坐标视为实心
  if(tx<0||ty<0||tx>=MAP_W||ty>=MAP_H)return true;
  return map[ty][tx]===1;
}
function moveAxis(obj,dx,dy,r,passThruProps){
  const collide = passThruProps ? solidTerrain : solid;
  if(dx!==0){
    const nx=obj.x+dx;
    if(!collide(nx+r,obj.y+r)&&!collide(nx+r,obj.y-r)&&
       !collide(nx-r,obj.y+r)&&!collide(nx-r,obj.y-r))
      obj.x=nx;
  }
  if(dy!==0){
    const ny=obj.y+dy;
    if(!collide(obj.x+r,ny+r)&&!collide(obj.x+r,ny-r)&&
       !collide(obj.x-r,ny+r)&&!collide(obj.x-r,ny-r))
      obj.y=ny;
  }
}

function resolveEntityCollisions(){
  const ents = [];
  if(player.dashDur<=0) ents.push({o:player, r:P_R+2, w:2});
  for(const e of enemies){
    if(e.state==='dead') continue;
    ents.push({o:e, r:P_R+2, w:1});
  }
  if(boss && boss.state!=='dead' && boss.state!=='charge'){
    ents.push({o:boss, r:BOSS_R+4, w:4});
  }

  for(let i=0;i<ents.length;i++){
    for(let j=i+1;j<ents.length;j++){
      const a=ents[i], b=ents[j];
      const dx=b.o.x-a.o.x, dy=b.o.y-a.o.y;
      const dist=Math.hypot(dx,dy);
      const minD=a.r+b.r;
      if(dist>=minD) continue;
      const overlap=minD-dist;
      let nx,ny;
      if(dist<0.001){ nx=Math.cos(i*1.7); ny=Math.sin(i*1.7); }
      else { nx=dx/dist; ny=dy/dist; }
      const totalW=a.w+b.w;
      const pushA=overlap*(b.w/totalW);
      const pushB=overlap*(a.w/totalW);
      const aNx=a.o.x-nx*pushA, aNy=a.o.y-ny*pushA;
      let aMovedX=false, aMovedY=false;
      if(!solidTerrain(aNx,a.o.y)){ a.o.x=aNx; aMovedX=true; }
      if(!solidTerrain(a.o.x,aNy)){ a.o.y=aNy; aMovedY=true; }
      const compX = aMovedX ? 0 : pushA;
      const compY = aMovedY ? 0 : pushA;
      const bNx=b.o.x+nx*(pushB+compX), bNy=b.o.y+ny*(pushB+compY);
      let bMovedX=false, bMovedY=false;
      if(!solidTerrain(bNx,b.o.y)){ b.o.x=bNx; bMovedX=true; }
      if(!solidTerrain(b.o.x,bNy)){ b.o.y=bNy; bMovedY=true; }
      if(!aMovedX && !bMovedX){
        const slide = 1.5;
        const sy1 = a.o.y + slide;
        const sy2 = a.o.y - slide;
        if(!solidTerrain(a.o.x, sy1)) a.o.y = sy1;
        else if(!solidTerrain(a.o.x, sy2)) a.o.y = sy2;
      }
      if(!aMovedY && !bMovedY){
        const slide = 1.5;
        const sx1 = a.o.x + slide;
        const sx2 = a.o.x - slide;
        if(!solidTerrain(sx1, a.o.y)) a.o.x = sx1;
        else if(!solidTerrain(sx2, a.o.y)) a.o.x = sx2;
      }
    }
  }
}

const cam={x:0,y:0,tx:0,ty:0,shX:0,shY:0,shDur:0,shAge:0,shAmp:0};
function camShake(dur,amp){cam.shDur=dur;cam.shAge=0;cam.shAmp=amp;}
function updateCam(px,py,dt){
  cam.tx=px-CW/2; cam.ty=py-CH/(2*ISO_Y_SCALE);
  cam.tx=Math.max(0,Math.min(MAP_W*TILE-CW,cam.tx));
  cam.ty=Math.max(0,Math.min(MAP_H*TILE-CH/ISO_Y_SCALE,cam.ty));
  cam.x+=(cam.tx-cam.x)*(1-Math.pow(0.01,dt));
  cam.y+=(cam.ty-cam.y)*(1-Math.pow(0.01,dt));
  if(cam.shAge<cam.shDur){
    cam.shAge+=dt;
    const t=1-cam.shAge/cam.shDur;
    cam.shX=(Math.random()-0.5)*2*cam.shAmp*t;
    cam.shY=(Math.random()-0.5)*2*cam.shAmp*t;
  }else{cam.shX=0;cam.shY=0;}
}
function ox(){return cam.x+cam.shX;}  // 保留浮点，避免双重取整导致角色抖动
function oy(){return cam.y+cam.shY;}

function hexToRgba(hex, a){
  const h = hex.replace('#','');
  const len = h.length;
  if(len===3){
    const r=parseInt(h[0]+h[0],16),g=parseInt(h[1]+h[1],16),b=parseInt(h[2]+h[2],16);
    return `rgba(${r},${g},${b},${a.toFixed(3)})`;
  }
  const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
  return `rgba(${r},${g},${b},${a.toFixed(3)})`;
}

let attackTimer=0;

const COMBO_WINDOW=2.0;

function execAttack(){
  attackTimer=0.18;  // 0.22 / 1.2
  if(atkComboTimer>0){
    comboIndex = (comboIndex+1) % COMBO_MAX_STEPS;
  } else {
    comboIndex=0;
    _shuffleCombo();  //
  }
  atkComboTimer=COMBO_WINDOW;
  player.state='attack';
  player.stateTimer=0.375;  // 0.45 / 1.2 = 1.2x speed
  player.attackDur=0.375;
  const stepT = comboIndex / (COMBO_MAX_STEPS-1);  // 0~1
  const stepSpd = 45 + stepT * 30;
  player.vx = player.facing * stepSpd;
  player.vy = 0;
  camShake(0.1,3);
  const fx=player.x+player.facing*28, fy=player.y-10;
  spawnSlashFX(fx,fy,player.facing);
  if(typeof _addFxShape === 'function'){
    const arc = 0.60*Math.PI + stepT*0.30*Math.PI;
    const fxFx = player.x + player.facing*28;
    const fyFx = player.y - 24;
    _addFxShape('crescent', fxFx, fyFx, {
      r: 32 + stepT*24,
      startAng: player.facing > 0 ? 0 : Math.PI,
      sweep: arc,
      thickness: 9 + stepT*6,
      palette: 'white',
      life: 0.3 + stepT*0.08
    });
    if(comboIndex === COMBO_MAX_STEPS-1){
      _addFxShape('slashgash', fxFx, fyFx, {
        angle: -0.5 * player.facing,
        len: 60, thickness: 9,
        palette: 'white',
        life: 0.32
      });
    }
  }
  if(ult.active) spawnUltSlash(fx,fy,player.facing);
  hitEnemiesInRange(fx,fy,32);
  if(boss&&boss.state!=='dead'){
    if(Math.hypot(boss.x-fx,boss.y-fy)<BOSS_HIT_R+30){
      const dmg=18+Math.floor(Math.random()*12);
      hitBoss(dmg,fx-boss.x,fy-boss.y);
    }
  }
  if(boss && boss.isLucia && typeof luciaTryHitClone === 'function'){
    luciaTryHitClone(fx, fy, 32, 18+Math.floor(Math.random()*12), 1, 0);
  }
}

function doAttack(){
  // Theed 格挡感知：玩家出手时设 flag
  window._playerAttackFlag = true;
  clearTimeout(window._playerAttackFlagTimer);
  window._playerAttackFlagTimer = setTimeout(()=>{ window._playerAttackFlag = false; }, 300);

  }

window._loadLevel = function(levelData){
  if(!levelData) return;
  const id = levelData.id || 3;

  boss = null;
  if(typeof enemies !== 'undefined') enemies.length = 0;
  if(window._clearFx) window._clearFx();

  // 自动 padding：地图至少 MIN_W×MIN_H，外围补墙(1)，原地图居中
  const MIN_W = 40, MIN_H = 40;
  const rawW = levelData.mapW || MAP_W;
  const rawH = levelData.mapH || MAP_H;
  const newW = Math.max(rawW, MIN_W);
  const newH = Math.max(rawH, MIN_H);
  const padX = Math.floor((newW - rawW) / 2);
  const padY = Math.floor((newH - rawH) / 2);
  MAP_W = newW;
  MAP_H = newH;
  // 把 padding 偏移暴露出来供 spawnPoint 校正
  window._mapPadX = padX;
  window._mapPadY = padY;
  window._mapRawW = rawW;
  window._mapRawH = rawH;

  // 重建 map 碰撞数组：外围全墙(1)，中央拷贝原 mapData
  if(levelData.mapData && typeof map !== 'undefined'){
    const md = levelData.mapData;
    map.length = 0;
    for(let ty = 0; ty < newH; ty++){
      const row = new Array(newW).fill(1);  // 默认全墙
      const srcY = ty - padY;
      if(srcY >= 0 && srcY < rawH && md[srcY]){
        for(let tx = 0; tx < newW; tx++){
          const srcX = tx - padX;
          if(srcX >= 0 && srcX < rawW && md[srcY][srcX] !== undefined)
            row[tx] = md[srcY][srcX];
        }
      }
      map.push(row);
    }
  }

  // 重建 mapCanvas 尺寸
  if(mapCanvas){
    const _mDPR = mapCanvas._mapDPR || 4;
    mapCanvas.width  = newW * TILE * _mDPR;
    mapCanvas.height = newH * TILE * _mDPR;
    // 重新 scale（每次修改 width/height 会重置变换矩阵）
    const mc2 = mapCanvas.getContext('2d');
    mc2.scale(_mDPR, _mDPR);
    mc2.imageSmoothingEnabled = true;
    mc2.imageSmoothingQuality = 'high';
  }

  // 移动玩家到出生点（按 padding 偏移修正）
  if(levelData.spawnPoint){
    player.x = levelData.spawnPoint.x + padX * TILE;
    player.y = levelData.spawnPoint.y + padY * TILE;
    cam.tx = player.x - canvas.width  / 2;
    cam.ty = player.y - canvas.height / (2 * ISO_Y_SCALE);
  }
  // boss 出生点同样偏移
  if(levelData.bossSpawn){
    levelData._bossSpawnAdjusted = {
      type: levelData.bossSpawn.type,
      x: levelData.bossSpawn.x + padX * TILE,
      y: levelData.bossSpawn.y + padY * TILE,
    };
  }

  // groundImg: 优先用 levelData 自己的，否则按 id 猜
  const groundUrl = levelData.groundImg || (id===3?'ground3_clean.png':'ground_map1.png');
  window._activeGroundUrl = groundUrl;

  mapReady = false;
  const mc = mapCanvas ? mapCanvas.getContext('2d') : null;
  if(!mc){ console.warn('[_loadLevel] mapCanvas not ready'); return; }
  mc.clearRect(0, 0, mapCanvas.width, mapCanvas.height);

  if(window.switchLevel){
    window.switchLevel({
      groundUrl: groundUrl,
      onReady: function(){
        if(typeof drawBaseGround === 'function') drawBaseGround(mc, MAP_W, MAP_H);
        if(typeof postprocessMapCanvas === 'function') postprocessMapCanvas(mc);
        mapReady = true;
        console.log('[_loadLevel] map ready, level', id, MAP_W+'x'+MAP_H);
        // 重新生成敌人 + L5 init
        if(typeof initEnemies === 'function') initEnemies();
        if(id === 5 && window._L5) window._L5.init();
        else if(id !== 5 && window._L5) window._L5.deactivate();
      }
    });
  } else {
    if(typeof drawBaseGround === 'function') drawBaseGround(mc, MAP_W, MAP_H);
    mapReady = true;
    if(typeof initEnemies === 'function') initEnemies();
    if(id === 5 && window._L5) window._L5.init();
    else if(id !== 5 && window._L5) window._L5.deactivate();
  }

  window._isLevel3 = (id === 3);
  window._currentLevelId = id;
  console.log('[_loadLevel] done, level', id, MAP_W+'x'+MAP_H);
};

  const dx = player.x - dmgX, dy = player.y - dmgY;
  const dl = Math.hypot(dx,dy)||1;
  const repulseP = isPerfect ? 280 : 160;
  player.vx = dx/dl * repulseP;
  player.vy = dy/dl * repulseP;

  if(boss && boss.state!=='dead'){
    const bdx = boss.x - player.x, bdy = boss.y - player.y;
    const bl   = Math.hypot(bdx,bdy)||1;
    const repulseB = isPerfect ? 380 : 220;
    boss.vx = bdx/bl * repulseB;
    boss.vy = bdy/bl * repulseB;
    boss.state = 'hurt'; boss.stateTimer = isPerfect ? 0.45 : 0.25;
    boss.hurtTimer = isPerfect ? 0.4 : 0.22;
    if(isPerfect){
      const cntDmg = 12 + Math.floor(Math.random()*8);

      if(dmgNums.length < DMGNUM_MAX)

      const orbits = role3SwordsAPI.getOrbits();
      orbits.forEach((s, i) => {
        s.state = 'shoot';
        const spread = 0.5;
        s.shootAngle = cAng + (i - (orbits.length-1)/2) / Math.max(1, orbits.length-1) * spread;
        s.shootSpd = 600;
        s.dmg = 30;
        s.kx = Math.cos(s.shootAngle) * 280;
        s.ky = Math.sin(s.shootAngle) * 280;

const playerProjectiles = [];

function updatePlayerProjectiles(dt){
  let pi=0;
  for(let i=0;i<playerProjectiles.length;i++){
    const p=playerProjectiles[i];

    p.x+=p.vx*dt; p.y+=p.vy*dt;
    p.spinA=(p.spinA||0)+p.spinSpd*dt; //
    if(p.trail){p.trail.push({x:p.x,y:p.y,a:p.spinA});if(p.trail.length>14)p.trail.shift();}

    if(boss&&boss.state!=='dead'&&Math.hypot(boss.x-p.x,boss.y-p.y)<BOSS_HIT_R+p.r){
      hitBoss(p.dmg,p.vx,p.vy);
      _crescentHitFX(p.x,p.y);
      continue;
    }
    if(boss && boss.isLucia && typeof luciaTryHitClone === 'function'){
      if(luciaTryHitClone(p.x, p.y, p.r+8, p.dmg, p.vx, p.vy)){
        _crescentHitFX(p.x,p.y);
        continue;
      }
    }
    let hit=false;
    for(const e of enemies){
      if(e.state==='dead'||e.hurtTimer>0) continue;
      if(Math.hypot(e.x-p.x,e.y-p.y)<P_R*3+p.r){
        const dmg=p.dmg+Math.floor(Math.random()*6);
        e.hp-=dmg; e.hurtTimer=0.25;
        combo++; comboTimer=COMBO_RESET; comboPeak=Math.max(comboPeak,combo);
        if(dmgNums.length<DMGNUM_MAX)
          dmgNums.push({x:e.x,y:e.y-30,val:dmg,age:0,life:0.8,vy:-40});
        _crescentHitFX(p.x,p.y);
        hit=true; break;
      }
    }
    if(hit) continue;
    if(p.age<p.life){
      playerProjectiles[pi++]=p;
    }
  }
  playerProjectiles.length=pi;
}

function drawShield(){
  if(!shield.active) return;
  const sx=Math.floor(player.x-ox());
  const sy=Math.floor((player.y-oy())*ISO_Y_SCALE);
  const cy=sy-22;   //
  const baseR=26;
  const pulse=Math.sin(shield.pulseT*4)*3;
  const r=baseR+pulse;
  const isFlash=shield.blockFlash>0;
  const flashT=isFlash?shield.blockFlash/0.35:0;

  ctx.save();
  const glow=ctx.createRadialGradient(sx,cy,r*0.5,sx,cy,r*1.6);
  if(isFlash){
    glow.addColorStop(0,'rgba(160,240,255,'+( 0.35+flashT*0.4)+')');
    glow.addColorStop(1,'rgba(0,180,255,0)');
  } else {
    glow.addColorStop(0,'rgba(40,160,255,'+(0.18+Math.sin(shield.pulseT*4)*0.06)+')');
    glow.addColorStop(1,'rgba(0,100,200,0)');
  }
  ctx.fillStyle=glow;
  ctx.beginPath();ctx.arc(sx,cy,r*1.6,0,Math.PI*2);ctx.fill();

  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a=i/6*Math.PI*2-Math.PI/6;
    const hx=sx+Math.cos(a)*r, hy=cy+Math.sin(a)*r;
    i===0?ctx.moveTo(hx,hy):ctx.lineTo(hx,hy);
  }
  ctx.closePath();
  const fillAlpha=isFlash?0.55+flashT*0.3:0.18+Math.sin(shield.pulseT*3)*0.06;
  ctx.fillStyle=isFlash?`rgba(160,240,255,${fillAlpha})`:`rgba(30,140,255,${fillAlpha})`;
  ctx.fill();
  const strokeAlpha=isFlash?0.95:0.55+Math.sin(shield.pulseT*5)*0.15;
  ctx.strokeStyle=isFlash?`rgba(220,250,255,${strokeAlpha})`:`rgba(80,200,255,${strokeAlpha})`;
  ctx.lineWidth=isFlash?2.5:1.5;
  ctx.stroke();

  if(isFlash){
    ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha=flashT*0.6;
    ctx.fillStyle='#AAEEFF';
    ctx.beginPath();ctx.arc(sx,cy,r*1.2,0,Math.PI*2);ctx.fill();
    ctx.globalCompositeOperation='source-over';
    ctx.globalAlpha=1;
  }

  const frac=Math.max(0,shield.dur/SHIELD_DUR);
  ctx.beginPath();
  ctx.arc(sx,cy,r+4,-Math.PI/2,-Math.PI/2+frac*Math.PI*2);
  ctx.strokeStyle='rgba(120,220,255,0.7)';
  ctx.lineWidth=2;
  ctx.stroke();

  ctx.restore();
}

const MAX_ARCHER_ALIVE = 3;  //
let _waveTimer = 0;           //
const WAVE_INTERVAL = 4.0;    //

// 精英怪（骑士）暂时关闭
const MAX_KNIGHT_ALIVE  = 0;   // 0 = 禁用
const KNIGHT_WAVE_EVERY = 3;   // 每3波小怪刷新一次骑士
let _waveCount = 0;            // 波次计数

function _countAliveArchers(){
  return enemies.filter(e => e.isArcher && e.state !== 'dead').length;
}

function _spawnArcherWave(){
  if(window._bossSpawnTriggered) return; // boss
  const alive = _countAliveArchers();
  const need = MAX_ARCHER_ALIVE - alive;
  if(need <= 0) return;

  const candidates = [];
  for(let ty = 2; ty < MAP_H-2; ty++){
    for(let tx = 2; tx < MAP_W-2; tx++){
      if(map[ty] && map[ty][tx] === 0){
        const wx = tx*TILE + TILE/2, wy = ty*TILE + TILE/2;
        if(Math.hypot(wx-player.x, wy-player.y) > 8*TILE){
          candidates.push([wx, wy]);
        }
      }
    }
  }
  if(!candidates.length) return;
  for(let i = 0; i < need; i++){
    const idx = Math.floor(Math.random() * candidates.length);
    const [cx, cy] = candidates[idx];
    const _e = _spawnWeightedEnemy(cx, cy);
    if(_e) enemies.push(_e);
  }
}

function _spawnWeightedEnemy(cx, cy){
  const r = Math.random();
  if(r < 0.50 && typeof window.spawnMonster1==='function') return window.spawnMonster1(cx,cy);
  if(r < 0.80 && typeof window.spawnMonster3==='function') return window.spawnMonster3(cx,cy);
  if(typeof window.spawnMonster2==='function') return window.spawnMonster2(cx,cy);
  if(typeof window.spawnMonster1==='function') return window.spawnMonster1(cx,cy);
  return null;
}

function _countAliveKnights(){
  return enemies.filter(e => e.isKnight && e.state !== 'dead').length;
}

function _spawnKnightWave(){
  if(window._bossSpawnTriggered) return;
  if(typeof window.spawnKnight !== 'function') return;
  const alive = _countAliveKnights();
  const need = MAX_KNIGHT_ALIVE - alive;
  if(need <= 0) return;

  const candidates = [];
  for(let ty = 3; ty < MAP_H-3; ty++){
    for(let tx = 3; tx < MAP_W-3; tx++){
      if(map[ty] && map[ty][tx] === 0){
        const wx = tx*TILE + TILE/2, wy = ty*TILE + TILE/2;
        if(Math.hypot(wx-player.x, wy-player.y) > 10*TILE){
          candidates.push([wx, wy]);
        }
      }
    }
  }
  if(!candidates.length) return;
  for(let i = 0; i < need; i++){
    const idx = Math.floor(Math.random() * candidates.length);
    const [cx, cy] = candidates[idx];
    enemies.push(window.spawnKnight(cx, cy));
  }
}

function _triggerBossSpawn(){

function initEnemies(){
  const candidates=[];
  for(let ty=2;ty<MAP_H-2;ty++) for(let tx=2;tx<MAP_W-2;tx++){
    if(map[ty]&&map[ty][tx]===0) candidates.push([tx*TILE+TILE/2,ty*TILE+TILE/2]);
  }
  const chosen=[];
  for(let i=0;i<candidates.length&&chosen.length<MAX_ARCHER_ALIVE;i++){
    const idx=Math.floor(Math.random()*candidates.length);
    const [cx,cy]=candidates[idx];
    if(Math.hypot(cx-player.x,cy-player.y)<6*TILE) continue;
    if(chosen.some(([ex,ey])=>Math.hypot(cx-ex,cy-ey)<5*TILE)) continue;
    chosen.push([cx,cy]);
    const _e2 = _spawnWeightedEnemy(cx, cy);
    if(_e2) enemies.push(_e2);
  }
}

function hitEnemiesInRange(ax,ay,hitR){
  for(const e of enemies){
    if(e.state==='dead'||e.hurtTimer>0) continue;
    if(Math.hypot(e.x-ax,e.y-ay)>hitR) continue;
    const dmg=18+Math.floor(Math.random()*12);
    combo++; comboTimer=COMBO_RESET; comboPeak=Math.max(comboPeak,combo);
    if(dmgNums.length<DMGNUM_MAX)
      dmgNums.push({x:e.x,y:e.y-30,val:dmg,age:0,life:0.8,vy:-40});
    // 精英怪走 takeDamage（有护盾系统）
    if(typeof e.takeDamage === 'function'){
      const kx=e.x-ax, ky=e.y-ay, kl=Math.hypot(kx,ky)||1;
      e.takeDamage(dmg, kx/kl*55, ky/kl*28);
      // takeDamage 可能立即设 state='dead'，在此处检测并给 kill/exp
      if(e.state==='dead' && !e._killCounted){
        e._killCounted = true;
        window.killCount = (window.killCount || 0) + (e.isKnight ? 3 : 1);
        if(window._L5){
          const expAmt = e.isKnight?30 : e.isMonster2?20 : e.isMonster3?15 : e.isMonster1?10 : e.isArcher?12 : 10;
          window._L5.addExp(expAmt, e.x, e.y);
        }
        if((currentChar===3||currentChar===5)&&window.role3&&window.role3SwordsAPI){
          window.role3.gainSword&&window.role3.gainSword();
          if(e.isKnight) window.role3.gainSword&&window.role3.gainSword();
        }
        Events&&Events.emit('enemy:killed',{x:e.x,y:e.y});
        if(e.isKnight){
          addParticle(e.x,e.y-30,{n:22,c:'#FFD060',spd:90,r:3,life:0.7,spread:Math.PI*2});
          addParticle(e.x,e.y-30,{n:10,c:'#FFFFFF',spd:60,r:1.5,life:0.4,spread:Math.PI*2});
          addParticle(e.x,e.y-30,{n:8, c:'#80AAFF',spd:50,r:2,life:0.5,spread:Math.PI*2});
        }
        if(!window._bossSpawnTriggered && window.killCount >= window.BOSS_KILL_THRESHOLD){
          window._bossSpawnTriggered = true;
          _triggerBossSpawn();
        }
      }
    } else {
      e.hp-=dmg;
      e.hurtTimer=0.25;
      const kx=e.x-player.x, ky=e.y-player.y;
      const kl=Math.hypot(kx,ky)||1;
      e.vx=kx/kl*220; e.vy=ky/kl*220;
      if(e.hp<=0){
        e.state='dead'; e.stateTimer=0.5;
        const kxN=e.x-ax, kyN=e.y-ay, klN=Math.hypot(kxN,kyN)||1;
        e.vx=kxN/klN*340; e.vy=kyN/klN*340;
        addParticle(e.x,e.y-20,{n:14,c:'#66FF88',spd:70,r:2,life:0.5,spread:Math.PI*2});
        addParticle(e.x,e.y-20,{n:6, c:'#FFFFFF',spd:40,r:1,life:0.3,spread:Math.PI*2});
        if(!e._killCounted){
          e._killCounted = true;
          window.killCount = (window.killCount || 0) + 1;
          if(window._L5){
            const expAmt = e.isMonster2?20:e.isMonster3?15:e.isMonster1?10:e.isArcher?12:10;
            window._L5.addExp(expAmt, e.x, e.y);
          }
          Events&&Events.emit('enemy:killed',{x:e.x,y:e.y});
        }
      } else {
        e.state='hurt'; e.stateTimer=0.22;
      }
    }
  }
}

function updateEnemies(dt){
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];

    if((e.isArcher || e.isKnight || e.isMonster1 || e.isMonster2 || e.isMonster3) && typeof e.update === 'function'){
      const wasDead = e.state === 'dead';
      e.update(dt, player);
      if(e.state==='dead' && !e._killCounted){
        e._killCounted = true;
        window.killCount = (window.killCount || 0) + (e.isKnight ? 3 : 1);
        if(window._L5){
          const expAmt = e.isKnight?30 : e.isMonster2?20 : e.isMonster3?15 : e.isMonster1?10 : e.isArcher?12 : 10;
          window._L5.addExp(expAmt, e.x, e.y);
        }
        if((currentChar === 3 || currentChar === 5) && window.role3 && window.role3SwordsAPI){
          window.role3.gainSword && window.role3.gainSword();
          if(e.isKnight) window.role3.gainSword && window.role3.gainSword();
        }
        Events && Events.emit('enemy:killed', { x: e.x, y: e.y });
        if(e.isKnight){
          addParticle(e.x,e.y-30,{n:22,c:'#FFD060',spd:90,r:3,life:0.7,spread:Math.PI*2});
          addParticle(e.x,e.y-30,{n:10,c:'#FFFFFF',spd:60,r:1.5,life:0.4,spread:Math.PI*2});
          addParticle(e.x,e.y-30,{n:8, c:'#80AAFF',spd:50,r:2,life:0.5,spread:Math.PI*2});
        }
        if(!window._bossSpawnTriggered && window.killCount >= window.BOSS_KILL_THRESHOLD){
          window._bossSpawnTriggered = true;
          _triggerBossSpawn();
        }
      }
      if(e.state === 'dead' && e.deadAge > (e.isKnight ? 1.8 : 1.2)) enemies.splice(i, 1);
      continue;
    }

    if(e.stateTimer>0) e.stateTimer-=dt;
    if(e.atkCooldown>0) e.atkCooldown-=dt;
    if(e.hurtTimer>0) e.hurtTimer-=dt;
    e.animT+=dt;

    if(e.state==='dead'){
      e.deadAge+=dt;
      e.vx*=Math.pow(0.001,dt); e.vy*=Math.pow(0.001,dt);
      if(e.stateTimer<=0) enemies.splice(i,1);
      continue;
    }

    const pdx=player.x-e.x, pdy=player.y-e.y;
    const pdist=Math.hypot(pdx,pdy);

    if(e.state==='hurt'){
      moveAxis(e,e.vx*dt,e.vy*dt,P_R);
      e.vx*=Math.pow(0.005,dt*4); e.vy*=Math.pow(0.005,dt*4);
      if(e.stateTimer<=0) e.state=pdist<ENEMY_LOSE?'chase':'patrol';

    } else if(pdist<ENEMY_ATK_R && e.atkCooldown<=0){
      e.state='attack'; e.stateTimer=0.45; e.atkCooldown=1.8;
      e.facing=pdx>0?1:-1;
      if(playerHurtTimer<=0){
        hurtPlayer(12,-pdx,-pdy);
      }

    } else if(e.state==='attack'){
      if(e.stateTimer<=0) e.state=pdist<ENEMY_LOSE?'chase':'patrol';

    } else if(pdist<ENEMY_DETECT || e.state==='chase'){
      if(pdist>ENEMY_LOSE){ e.state='patrol'; }
      else{
        e.state='chase';
        e.facing=pdx>0?1:-1;
        const ndx=pdx/pdist, ndy=pdy/pdist;
        e.vx+=(ndx*ENEMY_CHASE_SPD-e.vx)*Math.min(1,18*dt);
        e.vy+=(ndy*ENEMY_CHASE_SPD-e.vy)*Math.min(1,18*dt);
        moveAxis(e,e.vx*dt,e.vy*dt,P_R);
      }

    } else {
      e.state='patrol';
      e.wpWait-=dt;
      if(e.wpWait<=0){
        const angle=Math.random()*Math.PI*2;
        const rad=20+Math.random()*50;
        e.wpX=e.spawnX+Math.cos(angle)*rad;
        e.wpY=e.spawnY+Math.sin(angle)*rad;
        e.wpWait=1.5+Math.random()*2;
      }
      const wdx=e.wpX-e.x, wdy=e.wpY-e.y;
      const wd=Math.hypot(wdx,wdy);
      if(wd>6){
        e.facing=wdx>0?1:-1;
        const spd=ENEMY_PATROL_SPD;
        e.vx=wdx/wd*spd; e.vy=wdy/wd*spd;
        moveAxis(e,e.vx*dt,e.vy*dt,P_R);
      } else { e.vx=0;e.vy=0; }
    }
  }

  // 怪物间分离推开（防止重叠）
  const SEP_R = 28;
  for(let i=0;i<enemies.length;i++){
    const a=enemies[i];
    if(a.state==='dead') continue;
    for(let j=i+1;j<enemies.length;j++){
      const b=enemies[j];
      if(b.state==='dead') continue;
      const dx=b.x-a.x, dy=b.y-a.y;
      const dist=Math.hypot(dx,dy)||0.01;
      if(dist<SEP_R){
        const push=(SEP_R-dist)*0.5;
        const nx=dx/dist, ny=dy/dist;
        a.x-=nx*push; a.y-=ny*push;
        b.x+=nx*push; b.y+=ny*push;
      }
    }
  }

  if(playerHurtTimer>0) playerHurtTimer-=dt;

  let di=0;
  for(let i=0;i<dmgNums.length;i++){
    const d=dmgNums[i];
    d.age+=dt; d.y+=d.vy*dt; d.vy*=Math.pow(0.1,dt*3);
    if(d.age<d.life) dmgNums[di++]=d;
  }
  dmgNums.length=di;

  if(comboTimer>0){
    comboTimer-=dt;
    if(comboTimer<=0){ combo=0; comboTimer=0; }
  }
}

function _drawSingleEnemy(e){
  if((e.isArcher || e.isKnight || e.isMonster1 || e.isMonster2 || e.isMonster3) && typeof e.draw === 'function'){
    e.draw(ctx, ox(), oy(), ISO_Y_SCALE);
    return;
  }
  const ch=CHARS[0];
  const sx=Math.floor(e.x-ox()), sy=Math.floor((e.y-oy())*ISO_Y_SCALE);
  const isDead=e.state==='dead';
  const isHurt=e.hurtTimer>0;

  let fracPool, fracIdx;
  if(isDead||e.state==='hurt'){
    fracPool=ch.anim; fracIdx=0;
  } else if(e.state==='attack'){
    fracPool=ch.atk[0]&&ch.atk[0].length?ch.atk[0]:ch.anim;
    fracIdx=(1-Math.max(0,e.stateTimer)/0.45)*fracPool.length;
  } else if(e.state==='chase'){
    fracPool=ch.run&&ch.run.length?ch.run:ch.anim;
    fracIdx=e.animT*10;
  } else {
    fracPool=ch.anim;
    fracIdx=e.animT*6;
  }
  const frame=fracPool[Math.floor(fracIdx)%Math.max(1,fracPool.length)]||fracPool[0];

  ctx.save();
  if(isDead) ctx.globalAlpha=Math.max(0,1-e.deadAge/0.5);
  if(e.facing===-1){ ctx.translate(sx*2,0); ctx.scale(-1,1); }

  if(frame){
    const dh=CHAR_H, dw=Math.round(frame.width/frame.height*dh);
    if(isHurt&&Math.floor(e.hurtTimer*20)%2===0){
      drawFrameSmooth(fracPool, fracIdx, sx-dw/2, sy-dh, dw, dh);
      const fc=_getFlashCanvas(frame,dw,dh,'rgba(255,255,255,0.9)');
      ctx.globalCompositeOperation='lighter';
      ctx.drawImage(fc,sx-dw/2,sy-dh,dw,dh);
      ctx.globalCompositeOperation='source-over';
    } else {
      drawFrameSmooth(fracPool, fracIdx, sx-dw/2, sy-dh, dw, dh);
    }
  } else {
    ctx.fillStyle=isHurt?'#FFFFFF':'#44BB44';
    ctx.beginPath(); ctx.arc(sx,sy-16,12,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // 敌人头顶血条已移除
}

function drawEnemies(){
  for(const e of enemies) _drawSingleEnemy(e);
}

function _drawDmgNums(){
  ctx.font='bold 10px monospace';

  for(const d of dmgNums){
    const a=1-d.age/d.life;
    ctx.globalAlpha=a;
    const big=d.val>=25;
    ctx.font=`bold ${big?13:10}px monospace`;
    ctx.fillStyle=big?'#FF9922':'#FFEE44';
    ctx.shadowColor=big?'#FF6600':'#FFAA00'; ctx.shadowBlur=big?8:4;
    ctx.fillText('-'+d.val, Math.floor(d.x-ox()), Math.floor((d.y-oy())*ISO_Y_SCALE));
  }
  ctx.globalAlpha=1; ctx.shadowBlur=0; ctx.textAlign='left';
}

function drawPlayerHUD(){
  // ── 玩家 HP 条（左下角） ──────────────────────────────
  {
    const bw = 110, bh = 8;
    const bx = 14, by = CH - 28;
    const hr = Math.max(0, playerHp / playerMaxHp);

    // 背景底板（斜切菱形感）
    ctx.save();
    ctx.globalAlpha = 0.82;
    ctx.fillStyle = '#0a0508';
    ctx.beginPath();
    ctx.moveTo(bx - 4, by + bh/2);
    ctx.lineTo(bx, by - 2);
    ctx.lineTo(bx + bw + 4, by - 2);
    ctx.lineTo(bx + bw + 8, by + bh/2);
    ctx.lineTo(bx + bw + 4, by + bh + 2);
    ctx.lineTo(bx, by + bh + 2);
    ctx.closePath(); ctx.fill();

    // 血槽底色
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#2a0808';
    ctx.fillRect(bx, by, bw, bh);

    // 血量填充
    if(hr > 0){
      const fw = Math.max(3, bw * hr);
      const grad = ctx.createLinearGradient(bx, by, bx, by + bh);
      if(hr > 0.5){
        grad.addColorStop(0, '#dd3030');
        grad.addColorStop(0.5, '#aa1818');
        grad.addColorStop(1, '#880808');
      } else if(hr > 0.25){
        grad.addColorStop(0, '#ff6020');
        grad.addColorStop(0.5, '#cc3000');
        grad.addColorStop(1, '#881000');
      } else {
        // 低血量闪烁
        const pulse = 0.7 + Math.sin(gameTime * 8) * 0.3;
        grad.addColorStop(0, `rgba(255,40,40,${pulse})`);
        grad.addColorStop(1, `rgba(180,0,0,${pulse})`);
      }
      ctx.fillStyle = grad;
      ctx.fillRect(bx, by, fw, bh);
      // 高光线
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(bx, by, fw, 2);
    }

    // 分段刻度
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#000';
    for(let i = 1; i <= 3; i++){
      ctx.fillRect(bx + bw * i/4 - 1, by, 1, bh);
    }

    // 边框
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = hr > 0.25 ? '#883030' : '#ff3030';
    ctx.lineWidth = 1;
    ctx.strokeRect(bx, by, bw, bh);

    // 心形图标（左侧）
    ctx.globalAlpha = hr > 0.25 ? 0.8 : 0.5 + Math.sin(gameTime * 8) * 0.5;
    ctx.fillStyle = hr > 0.5 ? '#cc2020' : hr > 0.25 ? '#ff5520' : '#ff2020';
    const hx = bx - 14, hy = by + bh/2;
    ctx.beginPath();
    ctx.moveTo(hx, hy + 1);
    ctx.bezierCurveTo(hx - 5, hy - 4, hx - 9, hy + 1, hx, hy + 6);
    ctx.bezierCurveTo(hx + 9, hy + 1, hx + 5, hy - 4, hx, hy + 1);
    ctx.fill();

    // HP 数字
    ctx.globalAlpha = 0.9;
    ctx.font = 'bold 8px monospace';
    ctx.fillStyle = '#ffcccc';
    ctx.textAlign = 'left';
    ctx.fillText(`${Math.ceil(playerHp)}/${playerMaxHp}`, bx + 2, by + bh + 10);

    ctx.restore();
  }

  const sx=12, sy=34, sr=10;
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.beginPath();ctx.arc(sx+sr,sy+sr,sr+1,0,Math.PI*2);ctx.fill();
  if(shield.active){

    ctx.fillStyle=`rgba(40,160,255,${pulse*0.9})`;
    ctx.beginPath();ctx.arc(sx+sr,sy+sr,sr,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#AADDFF'; ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(sx+sr,sy+sr,sr,-Math.PI/2,-Math.PI/2+shield.dur/SHIELD_DUR*Math.PI*2);ctx.stroke();

    ctx.beginPath();ctx.moveTo(sx+sr,sy+sr);

    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='7px monospace'; ctx.textAlign='center';

  } else {
    ctx.fillStyle='rgba(40,120,220,0.8)';
    ctx.beginPath();ctx.arc(sx+sr,sy+sr,sr,0,Math.PI*2);ctx.fill();
  }
  ctx.save(); ctx.strokeStyle='rgba(180,230,255,0.9)'; ctx.lineWidth=1;
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=i/6*Math.PI*2-Math.PI/6;const hx=sx+sr+Math.cos(a)*6,hy=sy+sr+Math.sin(a)*6;i===0?ctx.moveTo(hx,hy):ctx.lineTo(hx,hy);}

// ── Boss 底部 HUD ─────────────────────────────────────────────────────────
let _bossHudPulse = 0; // 受击脉冲 0~1
function triggerBossHudPulse(){ _bossHudPulse = 1.0; }

function drawBossHUD(){
  const bossObj = (boss && boss.isLucia && typeof lucia !== 'undefined') ? lucia : boss;
  if(!bossObj || bossObj.state === 'dead') return;
  if(bossObj.isTheed) return; // Theed 不显示底部 HUD 血条

  // 受击脉冲衰减（每帧由 draw 调用，dt 近似用 _lastFrameDt）
  if(_bossHudPulse > 0) _bossHudPulse = Math.max(0, _bossHudPulse - (window._lastFrameDt||0.016) * 4);

  const pct = Math.max(0, bossObj.hp / bossObj.maxHp);

  const barW = 320, barH = 12;
  const bx = CW/2 - barW/2;
  const by = CH - 38;

  // Boss 名 + 阶段
  const bossName = boss.isLucia ? '绫  月' : boss.isXinmo ? '心  魔' : 'BOSS';
  const phase    = bossObj.phase || 1;
  const maxPhase = boss.isXinmo ? 3 : boss.isLucia ? 3 : 1;

  ctx.save();

  // 名字
  ctx.globalAlpha = 0.85 + _bossHudPulse * 0.15;
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  const nameColor = boss.isXinmo ? '#d090ff' : boss.isLucia ? '#ffaaaa' : '#FFE090';
  ctx.fillStyle = nameColor;
  ctx.shadowColor = nameColor; ctx.shadowBlur = _bossHudPulse * 14;
  ctx.fillText(bossName, CW/2, by - 6);
  ctx.shadowBlur = 0;

  // 阶段点
  if(maxPhase > 1){
    const dotR = 3, dotSpacing = 10;
    const dotsW = maxPhase * dotSpacing;
    let dx = CW/2 - dotsW/2 + dotR;
    for(let i = 1; i <= maxPhase; i++){
      ctx.globalAlpha = i <= phase ? 0.9 : 0.25;
      ctx.fillStyle = i <= phase ? nameColor : '#444';
      ctx.beginPath(); ctx.arc(dx, by - 18, dotR, 0, Math.PI*2); ctx.fill();
      dx += dotSpacing;
    }
  }

  // 背景底板（左右斜切）
  ctx.globalAlpha = 0.75;
  ctx.fillStyle = '#080408';
  ctx.beginPath();
  ctx.moveTo(bx - 8, by + barH/2);
  ctx.lineTo(bx, by - 2);
  ctx.lineTo(bx + barW, by - 2);
  ctx.lineTo(bx + barW + 8, by + barH/2);
  ctx.lineTo(bx + barW, by + barH + 2);
  ctx.lineTo(bx, by + barH + 2);
  ctx.closePath(); ctx.fill();

  // 血槽底
  ctx.globalAlpha = 0.65;
  ctx.fillStyle = '#1a0404';
  ctx.fillRect(bx, by, barW, barH);

  // 受击缓降（lagging bar）—— 用 _bossHudLagPct 追踪延迟
  if(window._bossHudLagPct === undefined) window._bossHudLagPct = pct;
  window._bossHudLagPct = Math.max(pct, window._bossHudLagPct - (window._lastFrameDt||0.016) * 0.35);
  if(window._bossHudLagPct > pct){
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#ffaa44';
    ctx.fillRect(bx, by, barW * window._bossHudLagPct, barH);
  }

  // 血量填充
  if(pct > 0){
    const fw = Math.max(4, barW * pct);
    const grad = ctx.createLinearGradient(bx, by, bx, by + barH);
    const pulse = _bossHudPulse;
    if(pct > 0.5){
      grad.addColorStop(0, `rgb(${200+Math.round(55*pulse)},40,40)`);
      grad.addColorStop(0.5, '#a01010');
      grad.addColorStop(1, '#600505');
    } else if(pct > 0.25){
      grad.addColorStop(0, '#ff7020');
      grad.addColorStop(0.5, '#cc3808');
      grad.addColorStop(1, '#801500');
    } else {
      const p2 = 0.75 + Math.sin(gameTime * 10) * 0.25;
      grad.addColorStop(0, `rgba(255,50,80,${p2})`);
      grad.addColorStop(1, `rgba(180,10,30,${p2})`);
    }
    ctx.globalAlpha = 0.9 + pulse * 0.1;
    ctx.fillStyle = grad;
    ctx.fillRect(bx, by, fw, barH);

    // 高光
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(bx, by, fw, 2);
  }

  // 刻度（0.3 / 0.6）
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = '#000';
  ctx.fillRect(bx + barW * 0.3 - 1, by, 1, barH);
  ctx.fillRect(bx + barW * 0.6 - 1, by, 1, barH);

  // 受击时边框脉冲
  ctx.globalAlpha = 0.4 + _bossHudPulse * 0.5;
  ctx.strokeStyle = _bossHudPulse > 0.1 ? '#ff8888' : (pct > 0.25 ? '#883333' : '#ff3333');
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, barW, barH);

  // HP 数字（右侧）
  ctx.globalAlpha = 0.7;
  ctx.font = '8px monospace';
  ctx.fillStyle = '#ffcccc';
  ctx.textAlign = 'right';
  ctx.fillText(`${Math.ceil(bossObj.hp)}/${bossObj.maxHp}`, bx + barW, by + barH + 11);

  ctx.textAlign = 'left';
  ctx.restore();
}

function _bfsBgRemoveBlack(d,w,h){
  const pts=[[0,0],[w-1,0],[0,h-1],[w-1,h-1],
             [w>>1,0],[0,h>>1],[w-1,h>>1],[w>>1,h-1]];
  let sr=0,sg=0,sb=0;
  for(const [px,py] of pts){
    const pi=(py*w+px)*4;
    sr+=d[pi];sg+=d[pi+1];sb+=d[pi+2];
  }
  const bgR=Math.round(sr/pts.length);
  const bgG=Math.round(sg/pts.length);
  const bgB=Math.round(sb/pts.length);
  const TOL=38;
  const isBg=(i)=>Math.abs(d[i]-bgR)<TOL&&Math.abs(d[i+1]-bgG)<TOL&&Math.abs(d[i+2]-bgB)<TOL;

  const vis=new Uint8Array(w*h);
  const q=[];
  const enq=(x,y)=>{
    if(x<0||y<0||x>=w||y>=h)return;
    const idx=y*w+x; if(vis[idx])return; vis[idx]=1;
    if(isBg(idx*4))q.push(x,y);
  };
  for(let x=0;x<w;x++){enq(x,0);enq(x,h-1);}
  for(let y=0;y<h;y++){enq(0,y);enq(w-1,y);}
  let qi=0;
  while(qi<q.length){
    const x=q[qi++],y=q[qi++];
    d[(y*w+x)*4+3]=0;
    enq(x-1,y);enq(x+1,y);enq(x,y-1);enq(x,y+1);
  }
  for(let pass=0;pass<2;pass++){
    for(let y=0;y<h;y++)for(let x=0;x<w;x++){
      const i=(y*w+x)*4;
      if(d[i+3]===0)continue;
      const hasTrans=(x>0&&d[(y*w+x-1)*4+3]===0)||(x<w-1&&d[(y*w+x+1)*4+3]===0)||
                     (y>0&&d[((y-1)*w+x)*4+3]===0)||(y<h-1&&d[((y+1)*w+x)*4+3]===0);
      if(!hasTrans)continue;
      if(Math.abs(d[i]-bgR)<TOL+20&&Math.abs(d[i+1]-bgG)<TOL+20&&Math.abs(d[i+2]-bgB)<TOL+20)
        d[i+3]=0;
    }
  }
}

function _gifToFrames(srcArr){
  const result=[];
  if(!srcArr||!srcArr.length)return result;
  for(const src of srcArr){
    const img=new Image();
    img.src=src;
    const fc=document.createElement('canvas');
    fc.width=img.naturalWidth||1; fc.height=img.naturalHeight||1;
    const fx=fc.getContext('2d');
    fx.drawImage(img,0,0);
    const id=fx.getImageData(0,0,fc.width,fc.height);
    _bfsBgRemoveBlack(id.data,fc.width,fc.height);
    fx.putImageData(id,0,0);
    result.push(fc);
  }
  return result;
}

function _loadKnightFrames(){
  if(typeof KNIGHT_FRAMES==='undefined'){spawnBoss();return;}

  const names=['walk','atk1','atk2','atk3'];
  const allData={};
  let remaining=names.length;

  function processGroup(name,srcArr,cb){
    if(!srcArr||!srcArr.length){cb([]);return;}
    const frames=new Array(srcArr.length).fill(null);
    let loaded=0;
    for(let i=0;i<srcArr.length;i++){
      const img=new Image();
      const idx=i;
      img.onload=()=>{
        const fc=document.createElement('canvas');
        fc.width=img.naturalWidth; fc.height=img.naturalHeight;
        const fx=fc.getContext('2d');
        fx.drawImage(img,0,0);
        frames[idx]=fc;
        if(++loaded===srcArr.length) cb(frames);
      };
      img.onerror=()=>{if(++loaded===srcArr.length) cb(frames);};
      img.src=srcArr[i];
    }
  }

  function finalize(){
    knightFrames.walk =allData.walk ||[];
    knightFrames.atk1 =allData.atk1 ||[];
    knightFrames.atk2 =allData.atk2 ||[];
    knightFrames.atk3 =allData.atk3 ||[];
    const allClean=(allData.all||[]).filter(Boolean);
    const total=allClean.length;
    knightFrames.idle=knightFrames.walk.slice(0,2);
    if(!knightFrames.idle.length) knightFrames.idle=knightFrames.atk1.slice(0,1);
    knightFrames.hurt=knightFrames.walk.slice(-3);
    knightFrames.dead=knightFrames.walk.slice(-4);
    if(!knightFrames.hurt.length) knightFrames.hurt=knightFrames.walk.slice(0,2);
    if(!knightFrames.dead.length) knightFrames.dead=knightFrames.walk.slice(0,2);
    const s=Object.entries(knightFrames).map(([k,v])=>`${k}:${v.length}`).join(' ');
    console.log('Knight frames ready:',s);
    spawnBoss();
  }

  for(const name of names){
    processGroup(name, KNIGHT_FRAMES[name]||[], (frames)=>{
      allData[name]=frames;
      if(--remaining===0) finalize();
    });
  }
}

function hurtPlayer(dmg,kx,ky,iTimer,sTimer){
  if(window.GAME_STATE && window.GAME_STATE !== 'playing') return;

      playerHurtTimer = 0.4;
      return;
    }
  }
  if(defendBlock(kx,ky)){playerHurtTimer=0.3;return;}
  if(playerHurtTimer>0)return;
  if(shieldBlock()){playerHurtTimer=0.2;return;}
  playerHp=Math.max(0,playerHp-dmg);
  playerHurtTimer=iTimer||0.5;
  window._screenRedT = 0.20;
  const ch=CF();
  if(ch.hit && ch.hit.length>0){

      if(dmg >= 30 && ch.hit3 && ch.hit3.length>0){

      } else if(dmg >= 15 && ch.hit2 && ch.hit2.length>0){

        player.stateTimer = sTimer || 0.35;
      } else {
        player._hitVariant = 1;       //
        player.stateTimer = sTimer || 0.28;
      }
      player.state = 'hit';
    }
  } else {
    player.state='hurt'; player.stateTimer=sTimer||0.3;

  const kl=Math.hypot(kx,ky)||1;
  player.vx=kx/kl*(iTimer===0.4?190:160); player.vy=ky/kl*(iTimer===0.4?190:160);

function _spawnHitFX(bx, by, dmg, isLucia){
  if(typeof addParticle !== 'function') return;
  const hitY = by - BOSS_H * 0.55;  // 命中点在 boss 身体中部
  const power = Math.min(1, dmg / 80);  // 0~1，伤害越高越强

    angle: -Math.PI / 2,   // 向上喷

    spread: Math.PI * 2,
    angle: Math.random() * Math.PI * 2
  });

  // 2. 红色/深红血雾（boss 血主主题）
  const bloodN = isLucia ? (3 + Math.floor(power * 8)) : 0;

    addParticle(bx, hitY, {
      n: bloodN, c: '#CC1111',
      spd: 40 + power * 90, r: 2 + power * 1.5,
      life: 0.3 + power * 0.2,
      spread: Math.PI * 2,
      angle: Math.random() * Math.PI * 2,
      gravity: 60
    });
