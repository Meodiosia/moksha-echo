<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<title>archer + bomber test</title>
<style>
  html,body{margin:0;background:#101216;color:#aaa;font:12px/1.4 monospace;}
  #wrap{display:flex;flex-direction:column;align-items:center;padding:8px;}
  canvas{display:block;background:#1a1d22;border:1px solid #333;cursor:crosshair;image-rendering:pixelated;}
  .hint{margin:6px 0;color:#888}
  .hint b{color:#ddd}
  button{background:#222;color:#ddd;border:1px solid #444;padding:4px 10px;margin:0 4px;cursor:pointer;font:12px monospace;}
  button:hover{background:#333}
</style>
</head>
<body>
<div id="wrap">
  <div class="hint">
    <b>archer + bomber test</b> ｜ 鼠标移动 = 玩家位置（AI 追鼠标）
    ｜ 左键攻击周围怪 (R=40)
    ｜
    <button id="btnA">+ archer</button>
    <button id="btnB">+ bomber</button>
    <button id="btnReset">reset</button>
  </div>
  <canvas id="cv" width="720" height="480"></canvas>
  <div class="hint" id="status">―</div>
</div>

<!-- 注意：archer/bomber 使用 window._addFxShape，本测试页内联了一个轻量 mock -->
<script>
// ── 简易 _addFxShape mock：让 test.html 能直接跑通（真实项目里此函数已存在）──
(function(){
  if(typeof window._addFxShape === 'function') return;
  const fxList = [];
  window._fxList = fxList;
  window._addFxShape = function(type, x, y, p){
    p = p || {};
    fxList.push({
      type, x, y,
      life: p.life || 0.4,
      age: 0,
      r: p.r || p.len || 30,
      color: p.color || 'rgba(220,30,30,1)',
      thickness: p.thickness || 4,
      count: p.count || 6,
      startAng: p.startAng || 0,
      sweep: (typeof p.sweep === 'number') ? p.sweep : Math.PI*2,
    });
  };
  window._stepFx = function(dt){
    for(let i=fxList.length-1;i>=0;i--){
      fxList[i].age += dt;
      if(fxList[i].age >= fxList[i].life) fxList.splice(i,1);
    }
  };
  window._drawFx = function(ctx){
    for(const f of fxList){
      const k = 1 - f.age/f.life;
      ctx.save();
      ctx.globalAlpha = Math.max(0, k);
      ctx.strokeStyle = f.color;
      ctx.fillStyle   = f.color;
      ctx.lineWidth   = f.thickness;
      ctx.translate(f.x, f.y);
      switch(f.type){
        case 'xslash': {
          const L = f.r * (0.4 + 0.6*(1-k));
          ctx.beginPath();
          ctx.moveTo(-L, -L); ctx.lineTo(L, L);
          ctx.moveTo( L, -L); ctx.lineTo(-L, L);
          ctx.stroke();
          break;
        }
        case 'crackline': {
          for(let i=0;i<f.count;i++){
            const a = i / f.count * Math.PI*2;
            const L = f.r * (0.5 + 0.5*(1-k));
            ctx.beginPath();
            ctx.moveTo(0,0);
            for(let s=1;s<=6;s++){
              const x = Math.cos(a)*L*(s/6) + (Math.random()-0.5)*1.5;
              const y = Math.sin(a)*L*(s/6) + (Math.random()-0.5)*1.5;
              ctx.lineTo(x, y);
            }
            ctx.stroke();
          }
          break;
        }
        case 'darkring': {
          const r = f.r * (0.4 + 0.6*(1-k));
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.arc(0,0, r, 0, Math.PI*2);
          ctx.stroke();
          ctx.globalAlpha *= 0.4;
          ctx.beginPath();
          ctx.arc(0,0, r*0.7, 0, Math.PI*2);
          ctx.fill();
          break;
        }
        case 'crescent': {
          ctx.lineWidth = f.thickness;
          ctx.beginPath();
          ctx.arc(0,0, f.r, f.startAng, f.startAng + f.sweep);
          ctx.stroke();
          break;
        }
        default: {
          ctx.beginPath();
          ctx.arc(0,0, f.r*0.4, 0, Math.PI*2);
          ctx.stroke();
        }
      }
      ctx.restore();
    }
  };
})();
</script>

<script src="archer_enemy.js"></script>
<script src="bomber_enemy.js"></script>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const status = document.getElementById('status');

// ── 玩家：跟随鼠标 ──
const player = {
  x: cv.width/2, y: cv.height/2,
  hp: 100, maxHp: 100,
  hurtT: 0,
  takeDamage(dmg, kx, ky){
    this.hp -= dmg;
    this.hurtT = 0.3;
    // 简单击退反馈（不实际位移玩家，因为玩家追鼠标）
  }
};

let mouseX = cv.width/2, mouseY = cv.height/2;
let mouseInside = false;
cv.addEventListener('mousemove', e => {
  const r = cv.getBoundingClientRect();
  mouseX = (e.clientX - r.left) * (cv.width / r.width);
  mouseY = (e.clientY - r.top)  * (cv.height / r.height);
});
cv.addEventListener('mouseenter', ()=>{ mouseInside = true; });
cv.addEventListener('mouseleave', ()=>{ mouseInside = false; });

// 左键 = 玩家近战，半径 40
cv.addEventListener('mousedown', e => {
  if(e.button !== 0) return;
  for(const en of enemies){
    if(en.state === 'dead') continue;
    const d = Math.hypot(en.x - player.x, en.y - player.y);
    if(d <= 40){
      en.takeDamage(12 + Math.floor(Math.random()*8),
        en.x - player.x, en.y - player.y);
    }
  }
});

// ── enemies 列表 ──
let enemies = [];

function reset(){
  enemies = [];
  enemies.push(window.spawnArcher(140, 240));
  enemies.push(window.spawnBomber(580, 240));
}
reset();

document.getElementById('btnA').onclick = ()=>{
  enemies.push(window.spawnArcher(60 + Math.random()*600, 60 + Math.random()*360));
};
document.getElementById('btnB').onclick = ()=>{
  enemies.push(window.spawnBomber(60 + Math.random()*600, 60 + Math.random()*360));
};
document.getElementById('btnReset').onclick = reset;

// ── 主循环 ──
let last = performance.now();
function frame(now){
  const dt = Math.min(0.05, (now - last)/1000);
  last = now;

  // 玩家追鼠标
  if(mouseInside){
    player.x = mouseX;
    player.y = mouseY;
  }
  if(player.hurtT > 0) player.hurtT -= dt;

  // 更新
  for(const e of enemies) e.update(dt, player);
  // 清死
  for(let i=enemies.length-1;i>=0;i--){
    const e = enemies[i];
    if(e.state === 'dead' && e.deadAge > 1.2) enemies.splice(i,1);
  }
  if(typeof window._stepFx === 'function') window._stepFx(dt);

  // 绘制
  ctx.fillStyle = '#1a1d22';
  ctx.fillRect(0,0,cv.width,cv.height);

  // 网格
  ctx.strokeStyle = '#23272d';
  ctx.lineWidth = 1;
  for(let x=0;x<cv.width;x+=40){
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,cv.height); ctx.stroke();
  }
  for(let y=0;y<cv.height;y+=40){
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(cv.width,y); ctx.stroke();
  }

  // enemies 按 y 排序
  enemies.sort((a,b)=> a.y - b.y);

  for(const e of enemies){
    e.draw(ctx, 0, 0, 1);
  }

  // FX
  if(typeof window._drawFx === 'function') window._drawFx(ctx);

  // 玩家（鼠标位置）
  ctx.save();
  if(player.hurtT > 0){
    ctx.fillStyle = 'rgba(255,80,80,0.4)';
    ctx.beginPath();
    ctx.arc(player.x, player.y, 18, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.fillStyle = '#4ec9ff';
  ctx.beginPath();
  ctx.arc(player.x, player.y, 8, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(player.x-12, player.y); ctx.lineTo(player.x+12, player.y);
  ctx.moveTo(player.x, player.y-12); ctx.lineTo(player.x, player.y+12);
  ctx.stroke();
  ctx.restore();

  // 玩家 HP bar
  ctx.fillStyle = '#000';
  ctx.fillRect(8, 8, 124, 12);
  ctx.fillStyle = '#3aff80';
  ctx.fillRect(10, 10, Math.max(0, 120 * player.hp/player.maxHp), 8);
  ctx.fillStyle = '#fff';
  ctx.fillText(`HP ${Math.max(0,player.hp|0)}/${player.maxHp}`, 14, 32);

  // 状态行
  const a = enemies.filter(e=>e.isArcher && e.state!=='dead').length;
  const b = enemies.filter(e=>e.isBomber && e.state!=='dead').length;
  status.textContent = `archers: ${a}  ｜  bombers: ${b}  ｜  player: (${player.x|0}, ${player.y|0})  ｜  player.hp = ${Math.max(0,player.hp|0)}`;

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
